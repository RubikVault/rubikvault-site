<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="UTF-8" />
  <title>Stock Analysis · RubikVault</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <meta name="description"
    content="Comprehensive technical analysis dashboard for any stock — Moving Averages, RSI, MACD, Bollinger Bands, and more." />
  <!-- OG / Social Meta (updated dynamically on render) -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="RubikVault" />
  <meta property="og:image" content="/assets/rv-favicon.png" />
  <meta property="og:title" id="og-title" content="Stock Analysis · RubikVault" />
  <meta property="og:description" id="og-desc" content="Technical analysis dashboard — Moving Averages, RSI, MACD, Bollinger Bands and more." />
  <meta property="og:url" id="og-url" content="https://rubikvault.com/analyze/" />
  <meta name="twitter:card" content="summary" />
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/rv-favicon.png" />
  <link rel="stylesheet" href="/style.css" />
  <link rel="stylesheet" href="/search.css" />
  <style>
    :root {
      --bg: #020617;
      --card: rgba(15, 23, 42, 0.92);
      --card-hover: rgba(15, 23, 42, 0.98);
      --border: rgba(148, 163, 184, 0.15);
      --border-bright: rgba(148, 163, 184, 0.3);
      --text: #f1f5f9;
      --text-dim: #94a3b8;
      --text-muted: #64748b;
      --accent: #06b6d4;
      --accent-glow: rgba(6, 182, 212, 0.12);
      --green: #10b981;
      --green-bg: rgba(16, 185, 129, 0.08);
      --red: #f87171;
      --red-bg: rgba(248, 113, 113, 0.08);
      --yellow: #fbbf24;
      --yellow-bg: rgba(251, 191, 36, 0.08);
      --radius: 16px;
      --radius-sm: 10px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .rv-main {
      max-width: 980px;
      margin: 0 auto;
      padding: 2rem 1.25rem 3rem;
    }

    /* ─── Header Card ─── */
    .header-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem 1.75rem;
      margin-bottom: 1rem;
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .header-left {
      display: flex;
      flex-direction: column;
      gap: 0.15rem;
    }

    .stock-title {
      font-size: 1.75rem;
      font-weight: 800;
      margin: 0;
      letter-spacing: -0.02em;
    }

    .stock-subtitle {
      font-size: 0.85rem;
      color: var(--text-dim);
    }

    .stock-form {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      flex-wrap: wrap;
    }

    .stock-form input {
      padding: 0.6rem 1rem;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(15, 23, 42, 0.6);
      color: var(--text);
      font-size: 0.95rem;
      width: 140px;
      outline: none;
    }

    .stock-form input:focus {
      border-color: var(--accent);
    }

    .stock-form button {
      padding: 0.6rem 1.25rem;
      border-radius: 999px;
      border: none;
      background: linear-gradient(135deg, #14b8a6, #06b6d4);
      color: #0f172a;
      font-weight: 700;
      cursor: pointer;
      font-size: 0.9rem;
    }

    .badges {
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
      margin-top: 0.5rem;
    }

    .badge {
      padding: 0.2rem 0.6rem;
      border-radius: 6px;
      font-size: 0.75rem;
      font-weight: 600;
      border: 1px solid var(--border);
      color: var(--text-dim);
      background: rgba(255, 255, 255, 0.03);
    }

    .badge.unknown {
      border-color: rgba(248, 113, 113, 0.4);
      color: var(--red);
    }

    /* ─── Price Block ─── */
    .price-block {
      display: flex;
      align-items: baseline;
      gap: 1rem;
      flex-wrap: wrap;
      margin-top: 0.75rem;
    }

    .price-big {
      font-size: 2.5rem;
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    .price-change {
      font-size: 1.1rem;
      font-weight: 700;
      padding: 0.25rem 0.6rem;
      border-radius: 8px;
    }

    .price-change.up {
      color: var(--green);
      background: var(--green-bg);
    }

    .price-change.down {
      color: var(--red);
      background: var(--red-bg);
    }

    .price-date {
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    /* ─── 52W Range ─── */
    .range-52w {
      margin-top: 0.75rem;
    }

    .range-bar {
      height: 6px;
      background: rgba(148, 163, 184, 0.15);
      border-radius: 3px;
      position: relative;
    }

    .range-dot {
      position: absolute;
      top: -3px;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--accent);
      border: 2px solid var(--bg);
      transform: translateX(-50%);
    }

    .range-labels {
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 0.2rem;
    }

    .range-labels .range-pct {
      font-size: 0.7rem;
      color: var(--text-dim);
    }

    /* ─── Error ─── */
    .error-box {
      padding: 0.75rem 1rem;
      border-radius: var(--radius-sm);
      background: var(--red-bg);
      border: 1px solid rgba(248, 113, 113, 0.4);
      color: var(--red);
      font-size: 0.85rem;
      margin-bottom: 1rem;
    }

    /* ─── Grid layout ─── */
    .sections-grid {
      display: grid;
      gap: 1rem;
      grid-template-columns: 1fr 1fr;
    }

    .section-full {
      grid-column: 1 / -1;
    }

    /* ─── Section Card ─── */
    .section {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.5rem;
      overflow: hidden;
    }

    .section h2 {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin: 0 0 0.75rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    /* ─── Metric Grid ─── */
    .m-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 0.5rem;
    }

    .m-item {
      padding: 0.6rem 0.75rem;
      border-radius: var(--radius-sm);
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.04);
    }

    .m-label {
      font-size: 0.7rem;
      color: var(--text-muted);
      margin-bottom: 0.15rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .m-val {
      font-size: 1rem;
      font-weight: 700;
    }

    .m-sub {
      font-size: 0.7rem;
      color: var(--text-dim);
      margin-top: 0.1rem;
    }

    /* ─── MA Table ─── */
    .ma-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }

    .ma-table th {
      text-align: left;
      font-size: 0.7rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      padding: 0.4rem 0.5rem;
      border-bottom: 1px solid var(--border);
      font-weight: 600;
    }

    .ma-table td {
      padding: 0.5rem 0.5rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.03);
    }

    .ma-table tr:last-child td {
      border-bottom: none;
    }

    .ma-pos {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      font-weight: 700;
      font-size: 0.8rem;
    }

    .ma-pos.above {
      color: var(--green);
    }

    .ma-pos.below {
      color: var(--red);
    }

    /* ─── Stack Badge ─── */
    .stack-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.4rem 0.8rem;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
    }

    .stack-badge.bullish {
      background: var(--green-bg);
      color: var(--green);
      border: 1px solid rgba(16, 185, 129, 0.3);
    }

    .stack-badge.bearish {
      background: var(--red-bg);
      color: var(--red);
      border: 1px solid rgba(248, 113, 113, 0.3);
    }

    .stack-badge.mixed {
      background: var(--yellow-bg);
      color: var(--yellow);
      border: 1px solid rgba(251, 191, 36, 0.3);
    }

    /* ─── Gauge ─── */
    .gauge {
      margin-bottom: 0.75rem;
    }

    .gauge:last-child {
      margin-bottom: 0;
    }

    .gauge-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 0.3rem;
    }

    .gauge-label {
      font-size: 0.8rem;
      font-weight: 600;
    }

    .gauge-value {
      font-size: 0.85rem;
      font-weight: 700;
    }

    .gauge-bar {
      height: 8px;
      background: rgba(148, 163, 184, 0.1);
      border-radius: 4px;
      position: relative;
      overflow: hidden;
    }

    .gauge-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.3s;
    }

    .gauge-zones {
      display: flex;
      gap: 0;
      height: 100%;
    }

    .gauge-zone {
      height: 100%;
    }

    .gauge-marker {
      position: absolute;
      top: -2px;
      width: 3px;
      height: 12px;
      background: white;
      border-radius: 1px;
      transform: translateX(-50%);
      box-shadow: 0 0 4px rgba(0, 0, 0, 0.5);
    }

    .gauge-ticks {
      display: flex;
      justify-content: space-between;
      font-size: 0.65rem;
      color: var(--text-muted);
      margin-top: 0.15rem;
    }

    /* ─── Signal chip ─── */
    .signal-chip {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.3rem 0.7rem;
      border-radius: 6px;
      font-size: 0.78rem;
      font-weight: 700;
    }

    .signal-chip.buy {
      background: var(--green-bg);
      color: var(--green);
    }

    .signal-chip.sell {
      background: var(--red-bg);
      color: var(--red);
    }

    .signal-chip.neutral {
      background: rgba(148, 163, 184, 0.08);
      color: var(--text-dim);
    }

    /* ─── Signal Table ─── */
    .sig-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }

    .sig-table th {
      text-align: left;
      font-size: 0.7rem;
      color: var(--text-muted);
      text-transform: uppercase;
      padding: 0.4rem 0.5rem;
      border-bottom: 1px solid var(--border);
      font-weight: 600;
    }

    .sig-table td {
      padding: 0.45rem 0.5rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.03);
    }

    .sig-table tr:last-child td {
      border-bottom: none;
    }

    /* ─── Perf bars ─── */
    .perf-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.35rem 0;
    }

    .perf-label {
      font-size: 0.8rem;
      color: var(--text-dim);
      width: 50px;
      text-align: right;
      flex-shrink: 0;
    }

    .perf-bar-container {
      flex: 1;
      height: 20px;
      position: relative;
      border-radius: 4px;
      overflow: hidden;
      background: rgba(148, 163, 184, 0.05);
    }

    .perf-bar {
      height: 100%;
      position: absolute;
      top: 0;
      border-radius: 4px;
      min-width: 2px;
    }

    .perf-bar.positive {
      background: linear-gradient(90deg, rgba(16, 185, 129, 0.4), rgba(16, 185, 129, 0.7));
      right: 50%;
    }

    .perf-bar.negative {
      background: linear-gradient(270deg, rgba(248, 113, 113, 0.4), rgba(248, 113, 113, 0.7));
      left: 50%;
    }

    .perf-center {
      position: absolute;
      left: 50%;
      top: 0;
      bottom: 0;
      width: 1px;
      background: rgba(148, 163, 184, 0.2);
    }

    .perf-val {
      font-size: 0.8rem;
      font-weight: 700;
      width: 65px;
      flex-shrink: 0;
    }

    .perf-val.positive {
      color: var(--green);
    }

    .perf-val.negative {
      color: var(--red);
    }

    /* ─── Levels ─── */
    .levels-list {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }

    .level-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.4rem 0.6rem;
      border-radius: 6px;
      border-left: 3px solid;
      font-size: 0.85rem;
      background: rgba(255, 255, 255, 0.02);
    }

    .level-item.support {
      border-left-color: var(--green);
    }

    .level-item.resistance {
      border-left-color: var(--red);
    }

    .level-item.current {
      border-left-color: var(--accent);
      background: var(--accent-glow);
    }

    .level-name {
      font-weight: 600;
      font-size: 0.8rem;
    }

    .level-price {
      font-weight: 700;
    }

    .level-dist {
      font-size: 0.75rem;
      color: var(--text-dim);
      margin-left: 0.5rem;
    }

    /* ─── S/R Level Ladder ─── */
    .sr-summary {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 0.75rem;
      margin-bottom: 0.5rem;
      align-items: start;
    }
    .sr-item { padding: 0.75rem; border-radius: var(--radius-sm); border: 1px solid var(--border); }
    .sr-item.support    { background: rgba(16,185,129,0.06); border-color: rgba(16,185,129,0.25); }
    .sr-item.resistance { background: rgba(248,113,113,0.06); border-color: rgba(248,113,113,0.25); }
    .sr-item.empty      { opacity: 0.5; }
    .sr-current { text-align: center; padding: 0.75rem 0.5rem; }
    .sr-label  { font-size: 0.65rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 0.25rem; }
    .sr-price  { font-size: 1.1rem; font-weight: 800; margin-bottom: 0.1rem; }
    .sr-item.support    .sr-price { color: var(--green); }
    .sr-item.resistance .sr-price { color: var(--red); }
    .sr-name  { font-size: 0.75rem; color: var(--text-dim); }
    .sr-dist  { font-size: 0.72rem; color: var(--text-muted); }
    .sr-trigger  { font-size: 0.7rem; color: var(--accent); margin-top: 0.2rem; }
    .sr-invalid  { font-size: 0.7rem; color: var(--red); margin-top: 0.2rem; }
    .key-level { font-weight: 700; }
    @media (max-width: 500px) { .sr-summary { grid-template-columns: 1fr; } }

    /* ─── Collapsible Advanced Sections ─── */
    details.advanced-collapsible {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 1rem 1.25rem;
    }
    details.advanced-collapsible[open] { padding-bottom: 1rem; }
    summary.section-summary-header {
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--text-dim);
      list-style: none;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      user-select: none;
    }
    summary.section-summary-header::before { content: '▶'; font-size: 0.6rem; transition: transform 0.2s; }
    details[open] > summary.section-summary-header::before { transform: rotate(90deg); }
    summary.section-summary-header::-webkit-details-marker { display: none; }
    .advanced-badge {
      font-size: 0.6rem; font-weight: 700; letter-spacing: 0.08em;
      background: rgba(148,163,184,0.12); color: var(--text-muted);
      padding: 0.1rem 0.35rem; border-radius: 4px; border: 1px solid var(--border);
    }

    /* ─── Decision Strip ─── */
    .decision-strip-section { grid-column: 1 / -1; }
    .decision-strip {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.75rem;
    }
    @media (max-width: 640px) { .decision-strip { grid-template-columns: 1fr; } }
    .decision-card {
      border-radius: var(--radius-sm);
      padding: 1rem;
      border: 1px solid var(--border);
    }
    .decision-card.bullish { background: var(--green-bg); border-color: rgba(16,185,129,0.35); }
    .decision-card.bearish { background: var(--red-bg);   border-color: rgba(248,113,113,0.35); }
    .decision-card.neutral { background: var(--yellow-bg); border-color: rgba(251,191,36,0.35); }
    .decision-horizon {
      font-size: 0.7rem; font-weight: 700; letter-spacing: 0.1em;
      color: var(--text-dim); text-transform: uppercase; margin-bottom: 0.35rem;
    }
    .decision-horizon-sub { font-weight: 400; letter-spacing: 0; }
    .decision-verdict {
      font-size: 1.25rem; font-weight: 800; letter-spacing: 0.04em; margin-bottom: 0.25rem;
    }
    .decision-card.bullish .decision-verdict { color: var(--green); }
    .decision-card.bearish .decision-verdict { color: var(--red); }
    .decision-card.neutral .decision-verdict { color: var(--yellow); }
    .decision-conf { font-size: 0.75rem; color: var(--text-dim); margin-bottom: 0.5rem; }
    .decision-reasons {
      margin: 0 0 0.5rem 0; padding: 0 0 0 1rem;
      font-size: 0.75rem; color: var(--text); line-height: 1.5;
    }
    .decision-reasons li { margin-bottom: 0.15rem; }
    .decision-trigger, .decision-invalid {
      font-size: 0.72rem; color: var(--text-dim); margin-top: 0.2rem;
      line-height: 1.4;
    }
    .decision-trigger { color: var(--accent); }

    /* ─── Verdict ─── */
    .verdict-box {
      text-align: center;
      padding: 1rem;
      border-radius: var(--radius-sm);
      margin-bottom: 0.75rem;
      font-size: 1.1rem;
      font-weight: 800;
      letter-spacing: 0.04em;
    }

    .verdict-box.bullish {
      background: var(--green-bg);
      color: var(--green);
      border: 1px solid rgba(16, 185, 129, 0.3);
    }

    .verdict-box.bearish {
      background: var(--red-bg);
      color: var(--red);
      border: 1px solid rgba(248, 113, 113, 0.3);
    }

    .verdict-box.neutral {
      background: var(--yellow-bg);
      color: var(--yellow);
      border: 1px solid rgba(251, 191, 36, 0.3);
    }

    .verdict-detail {
      font-size: 0.8rem;
      color: var(--text-dim);
      text-align: center;
    }

    /* ─── Score card ─── */
    .score-chips {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 0.5rem;
    }

    .score-chip {
      border-radius: 8px;
      padding: 0.3rem 0.7rem;
      border: 1px solid var(--border);
      font-size: 0.85rem;
      font-weight: 700;
    }

    .score-chip.positive {
      border-color: rgba(16, 185, 129, 0.5);
      background: var(--green-bg);
      color: var(--green);
    }

    .score-chip.negative {
      border-color: rgba(248, 113, 113, 0.5);
      background: var(--red-bg);
      color: var(--red);
    }

    .score-chip.n {
      border-color: var(--border);
      color: var(--text-dim);
    }

    .score-reasons {
      display: grid;
      gap: 0.5rem;
      margin-top: 0.5rem;
    }

    .score-reason-group {
      border-top: 1px solid var(--border);
      padding-top: 0.5rem;
    }

    .score-reason-group h3 {
      margin: 0 0 0.25rem;
      font-size: 0.8rem;
      color: var(--text-dim);
    }

    .score-reason {
      font-size: 0.8rem;
      color: var(--text);
    }

    /* ─── Loading ─── */
    .loading-state {
      text-align: center;
      padding: 3rem;
      color: var(--text-dim);
    }

    /* ─── Responsive ─── */
    @media (max-width: 700px) {
      .sections-grid {
        grid-template-columns: 1fr;
      }

      .header-top {
        flex-direction: column;
        align-items: flex-start;
      }

      .stock-title {
        font-size: 1.4rem;
      }

      .price-big {
        font-size: 2rem;
      }
    }
  </style>
</head>

<body>
  <noscript>
    <div style="max-width:680px;margin:2rem auto;padding:1.5rem;font-family:system-ui,sans-serif;background:#0f172a;color:#f1f5f9;border-radius:12px;border:1px solid #334155;text-align:center;">
      <h2 style="margin:0 0 0.75rem">⚠️ JavaScript Required</h2>
      <p style="color:#94a3b8;margin:0 0 1rem">RubikVault Stock Analyzer requires JavaScript for live technical analysis.</p>
      <p style="color:#64748b;font-size:0.85rem">Enable JavaScript in your browser or visit <a href="https://rubikvault.com" style="color:#06b6d4">rubikvault.com</a> for more information.</p>
    </div>
  </noscript>
  <!-- HEADER (same as frontpage) -->
  <header class="rv-header">
    <div class="rv-header-inner">
      <a class="rv-brand" href="/" aria-label="RubikVault">
        <img class="rv-brand-icon" src="/assets/rv-icon.png" alt="" />
        <span class="rv-brand-text">RubikVault</span>

            style="display:none;position:absolute;top:100%;left:0;right:0;margin-top:4px;z-index:9999;max-height:300px;overflow-y:auto;background:var(--card, #0f172a);border:1px solid #334155;border-radius:8px;box-shadow:0 10px 25px rgba(0,0,0,0.8)">

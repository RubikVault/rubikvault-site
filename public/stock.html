  <script src="/js/stock-features.js"></script>
  <script>
    // ─── State ────────────────────────────────────────────────────────────────────
    const form = document.getElementById('stock-form');
    const tickerInput = document.getElementById('stock-ticker');
    const errorBox = document.getElementById('stock-error');
    const app = document.getElementById('app');
    const params = new URLSearchParams(window.location.search);

    form.addEventListener('submit', e => { e.preventDefault(); const t = tickerInput.value.trim(); if (t) loadTicker(t); });

    // Extract ticker from URL: /analyze/:ticker (path) or ?ticker= (query param)
    const pathMatch = window.location.pathname.match(/\/analyze\/(.+)/);
    const initialTicker = (pathMatch ? decodeURIComponent(pathMatch[1]) : params.get('ticker') || '').trim();
    if (initialTicker) { tickerInput.value = initialTicker; loadTicker(initialTicker); }

    // ─── Ticker Autocomplete (re-uses /api/universe) ──────────────────────────────
    const acDropdown = document.getElementById('stock-ac-dropdown');
    let acTimer = null, acSuggestions = [], acIndex = -1, acOpen = false;
    function acPriority(item, query) {
      const ticker = String(item?.ticker || '').toUpperCase();
      const exchange = String(item?.exchange || '').toUpperCase();
      const name = String(item?.name || '').trim().toLowerCase();
      const qTicker = String(query || '').trim().toUpperCase();
      const qName = String(query || '').trim().toLowerCase();
      const rank = ticker === qTicker ? 0 : ticker.startsWith(qTicker) ? 1 : name.startsWith(qName) ? 2 : 3;
      const usRank = exchange === 'US' ? 0 : 1;
      return [rank, usRank, ticker.length || 99, ticker];
    }
    function acCompare(a, b, query) {
      const pa = acPriority(a, query), pb = acPriority(b, query);
      for (let i = 0; i < pa.length; i++) {
        if (pa[i] < pb[i]) return -1;
        if (pa[i] > pb[i]) return 1;
      }
      return 0;
    }
    function acDedupeKey(item) {
      // Dedup by ticker first — ensures AAPL only appears once regardless of exchange
      const ticker = String(item?.ticker || '').toUpperCase();
      if (ticker) return `ticker:${ticker}`;
      const name = String(item?.name || '').trim().toLowerCase();
      if (name && name.length >= 3) return `name:${name}`;
      return `raw:${ticker}`;
    }

    function renderAC() {
      if (!acSuggestions.length) { acDropdown.style.display = 'none'; acOpen = false; return; }
      acDropdown.innerHTML = '';
      acSuggestions.forEach((item, idx) => {
        const div = document.createElement('div');
        div.className = 'rv-dd-item' + (idx === acIndex ? ' rv-dd-item--highlighted' : '');
        div.style.padding = '8px 12px'; div.style.cursor = 'pointer'; div.style.borderBottom = '1px solid rgba(255,255,255,0.05)';
        div.innerHTML = `<strong>${item.name ? `${item.name} (${item.ticker}${item.exchange ? ` · ${item.exchange}` : ''})` : `${item.ticker}${item.exchange ? ` · ${item.exchange}` : ''}`}</strong>`;
        div.addEventListener('mousedown', (e) => { e.preventDefault(); selectAC(idx); });
        acDropdown.appendChild(div);
      });
      acDropdown.style.display = 'block'; acOpen = true;
    }

    function selectAC(idx) {
      if (!acSuggestions[idx]) return;
      tickerInput.value = acSuggestions[idx].ticker;
      acDropdown.style.display = 'none'; acOpen = false;
      loadTicker(acSuggestions[idx].ticker);
    }

    let acActiveController = null;
    tickerInput.addEventListener('input', () => {
      const q = tickerInput.value.trim();
      if (!q) { acSuggestions = []; renderAC(); return; }
      if (acActiveController) acActiveController.abort();

      clearTimeout(acTimer);
      acTimer = setTimeout(async () => {  // 0ms = instant from 1st character
        acActiveController = new AbortController();
        const { signal } = acActiveController;
        try {
          const res = await fetch(`/api/universe?q=${encodeURIComponent(q)}&limit=8&t=${Date.now()}`, { signal });
          if (!res.ok) return;
          const data = await res.json();
          const deduped = new Map();
          (data?.data?.symbols || [])
            .map(s => ({
              ticker: s.symbol,
              name: s.name,
              exchange: s.exchange || (typeof s.canonical_id === 'string' && s.canonical_id.includes(':') ? s.canonical_id.split(':')[0] : null)
            }))
            .filter(s => s.ticker)
            .forEach((s) => {
              const key = acDedupeKey(s);
              const prev = deduped.get(key);
              if (!prev || acCompare(s, prev, q) < 0) {
                deduped.set(key, s);
              }
            });
          acSuggestions = Array.from(deduped.values()).sort((a, b) => acCompare(a, b, q)).slice(0, 8);
          acIndex = -1; renderAC();
        } catch (e) {
          if (e.name !== 'AbortError') console.error('AC fetch err', e);
        }
      }, 0);
    });

    tickerInput.addEventListener('keydown', e => {
      if (!acOpen || !acSuggestions.length) return;
      if (e.key === 'ArrowDown') { e.preventDefault(); acIndex = Math.min(acSuggestions.length - 1, acIndex + 1); renderAC(); }
      else if (e.key === 'ArrowUp') { e.preventDefault(); acIndex = Math.max(0, acIndex - 1); renderAC(); }
      else if (e.key === 'Enter') { e.preventDefault(); selectAC(Math.max(0, acIndex)); }
      else if (e.key === 'Escape') { acDropdown.style.display = 'none'; acOpen = false; }
    });

    tickerInput.addEventListener('focus', () => { if (tickerInput.value.trim() && acSuggestions.length) { acDropdown.style.display = 'block'; acOpen = true; } });
    tickerInput.addEventListener('blur', () => { setTimeout(() => { acDropdown.style.display = 'none'; acOpen = false; }, 200); });

    // ─── Formatters ───────────────────────────────────────────────────────────────
    const fmt = (v, d = 2) => v == null || !isFinite(v) ? '—' : v.toFixed(d);
    const fmtPct = v => v == null || !isFinite(v) ? '—' : `${(v * 100).toFixed(2)}%`;
    const fmtPctSigned = v => { if (v == null || !isFinite(v)) return '—'; const pv = (v * 100).toFixed(2); return v >= 0 ? `+${pv}%` : `${pv}%`; };
    const fmtCur = (v, c = 'USD') => v == null || !isFinite(v) ? '—' : new Intl.NumberFormat('en-US', { style: 'currency', currency: c }).format(v);
    const fmtVol = v => v == null || !isFinite(v) ? '—' : v >= 1e6 ? `${(v / 1e6).toFixed(1)}M` : v >= 1e3 ? `${(v / 1e3).toFixed(0)}K` : v.toFixed(0);
    const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));

    // ─── Load Ticker ──────────────────────────────────────────────────────────────
    async function loadTicker(ticker) {
      document.getElementById('stock-subtitle').textContent = `Loading ${ticker.toUpperCase()}…`;
      document.getElementById('price-block').style.display = 'none';
      document.getElementById('range-52w').style.display = 'none';
      errorBox.style.display = 'none';
      app.innerHTML = '<div class="loading-state">⏳ Fetching data…</div>';

      try {
        const res = await fetch(`/api/stock?ticker=${encodeURIComponent(ticker)}`);
        const payload = await res.json();
        render(payload);
      } catch (err) {
        errorBox.style.display = 'block';
        errorBox.textContent = `Network error: ${err.message}`;
      }
    }

    // ─── Main Render ──────────────────────────────────────────────────────────────
    function render(payload) {
      const { data, error, metadata } = payload;
      window._rvMetadata = metadata; // expose for features
      window._rvEnvelopeMeta = payload.meta || {}; // expose envelope meta for provenance bar
      const ticker = metadata?.request?.normalized_ticker || data?.ticker || '—';
      const stats = data?.market_stats?.stats || {};
      const prices = data?.market_prices || {};
      const universe = data?.universe || {};
      const score = data?.market_score || {};
      const bars = data?.bars || [];
      const change = data?.change || {};
      const close = prices.close ?? bars[bars.length - 1]?.close ?? null;

      // ── Header ──
      document.getElementById('stock-title').textContent = universe.name || ticker;
      document.getElementById('stock-subtitle').textContent = universe.name ? `${ticker} · ${universe.exchange || ''} · ${universe.sector || ''}`.replace(/· $/, '') : ticker;
      document.title = `${ticker} — Stock Analysis · RubikVault`;

      // ── OG meta dynamic update ──
      const ogTitle = document.getElementById('og-title');
      const ogDesc  = document.getElementById('og-desc');
      const ogUrl   = document.getElementById('og-url');
      if (ogTitle) ogTitle.setAttribute('content', `${ticker} — Stock Analysis · RubikVault`);
      if (ogDesc)  ogDesc.setAttribute('content',  `Technical analysis for ${universe.name || ticker}: Moving Averages, RSI, MACD, Bollinger Bands and more.`);
      if (ogUrl)   ogUrl.setAttribute('content',   `https://rubikvault.com/analyze/${encodeURIComponent(ticker)}`);

      // Badges
      const badgesEl = document.getElementById('stock-badges');
      badgesEl.innerHTML = '';
      const indexes = universe.indexes || [];
      if (indexes.length) {
        indexes.forEach(idx => { badgesEl.innerHTML += `<span class="badge">${idx}</span>`; });
      } else if (!universe.exists_in_universe) {
        badgesEl.innerHTML = '<span class="badge unknown">Not in universe</span>';
      }

      // Price block
      if (close != null) {
        document.getElementById('price-block').style.display = 'flex';
        document.getElementById('price-big').textContent = fmtCur(close, prices.currency || 'USD');
        const chg = change.pct ?? stats.ret_1d_pct;
        const chgAbs = change.abs ?? stats.ret_1d_abs;
        const changeEl = document.getElementById('price-change');
        if (chg != null) {
          const sign = chg >= 0 ? '+' : '';
          changeEl.textContent = `${sign}${fmtCur(chgAbs, prices.currency || 'USD')} (${sign}${(chg * 100).toFixed(2)}%)`;
          changeEl.className = `price-change ${chg >= 0 ? 'up' : 'down'}`;
        } else { changeEl.textContent = ''; }
        document.getElementById('price-date').textContent = prices.date ? `as of ${prices.date}` : '';
      }

      // 52W Range
      const h52 = stats.high_52w, l52 = stats.low_52w;
      if (h52 != null && l52 != null && close != null && h52 > l52) {
        document.getElementById('range-52w').style.display = 'block';
        const pct = ((close - l52) / (h52 - l52)) * 100;
        document.getElementById('range-dot').style.left = `${clamp(pct, 2, 98)}%`;
        document.getElementById('range-low').textContent = fmtCur(l52);
        document.getElementById('range-high').textContent = fmtCur(h52);
        const fromHigh = ((close - h52) / h52 * 100).toFixed(1);
        document.getElementById('range-pct').textContent = `${fromHigh}% from high`;
      }

      // ── Error ──
      if (error) {
        errorBox.style.display = 'block';
        errorBox.innerHTML = `<strong>${error.code}</strong>: ${error.message}`;
      }

      // ── Sections ──
      app.innerHTML = buildSections(ticker, close, stats, score, bars, universe);
      // Load async integrations (Scientific, Forecast, Elliott)
      loadAsyncInsights(ticker, { close, stats, bars, universe });
    }

    // ─── Build All Sections ───────────────────────────────────────────────────────
    function buildSections(ticker, close, s, score, bars, universe) {
      const md = window._rvMetadata || {};
      return `<div class="sections-grid">
      ${buildDecisionStrip(ticker, close, s, bars)}
      ${buildExecutiveSummary(ticker, close, s, bars, universe)}
      ${buildDataProvenance(md, {}, bars)}
      ${buildOHLCVStrip(close, s, bars)}
      ${buildVerdict(close, s)}
      ${buildTrendMomentum(close, s, bars)}
      <div id="rv-scientific-slot"><div class="section section-full" style="opacity:.5"><h2>🔬 Scientific Analyzer</h2><div class="placeholder-card">Loading scientific analysis…</div></div></div>
      <details class="advanced-collapsible" open><summary class="section-summary-header">🔮 ML Forecast</summary><div id="rv-forecast-slot"><div style="opacity:.5;padding:.5rem 0"><div class="placeholder-card">Loading forecast…</div></div></div></details>
      <details class="advanced-collapsible" open><summary class="section-summary-header">🌊 Elliott Wave</summary><div id="rv-elliott-slot"><div style="opacity:.5;padding:.5rem 0"><div class="placeholder-card">Loading wave analysis…</div></div></div></details>
      ${buildMASection(close, s)}
      ${buildOscillators(close, s)}
      ${buildPerformance(s)}
      ${buildEarningsShockProxy(bars)}
      ${buildVolatility(close, s)}
      ${buildDrawdownAnatomy(bars)}
      ${buildVolTermStructure(bars)}
      ${buildMonteCarlo(bars)}
      ${buildLiquidityScore(s, bars)}
      ${buildVolume(s, bars)}
      ${buildSeasonality(bars)}
      ${buildCorrelations(ticker, bars)}
      ${buildFactorCorrelation(ticker, bars)}
      ${buildLevels(close, s, bars)}
      ${buildATRBands(close, s)}
      ${buildRiskBudget(close, s)}
      ${buildSignals(close, s)}
      ${buildStressScenarios(bars)}
      ${buildMacroRegime()}
      ${buildFundamentalsPlaceholder(ticker)}
      ${buildPeersPlaceholder(ticker, universe)}
      ${buildCrossAssetRadar()}
      ${buildMarketIntelligence(ticker)}
      ${buildScore(score)}
      ${buildPriceConclusion(ticker, close, s, bars, universe)}
      ${buildCorporateActions(bars)}
    </div>`;
    }

    // ─── Async Integration Loader ────────────────────────────────────────────────
    async function loadAsyncInsights(ticker, context = {}) {
      const slots = [
        { id: 'rv-scientific-slot', fn: () => buildScientificInsight(ticker, context) },
        { id: 'rv-forecast-slot', fn: () => buildForecastInsight(ticker, context) },
        { id: 'rv-elliott-slot', fn: () => buildElliottInsight(ticker, context) },
      ];
      await Promise.allSettled(slots.map(async ({ id, fn }) => {
        try {
          const html = await fn();
          const el = document.getElementById(id);
          if (el && html) {
            el.innerHTML = html;
          } else if (el) {
            el.innerHTML = '<div style="font-size:.72rem;color:var(--text-muted);padding:.3rem 0">Data not loaded for this ticker.</div>';
            const details = el.closest('details');
            if (details) details.removeAttribute('open');
          }
        } catch (e) {
          console.warn('Async insight error:', id, e);
          const el = document.getElementById(id);
          if (el) {
            el.innerHTML = '<div style="font-size:.72rem;color:var(--text-muted);padding:.3rem 0">Data not loaded for this ticker.</div>';
            const details = el.closest('details');
            if (details) details.removeAttribute('open');
          }
        }
      }));
    }

    // Shared Bollinger signal — used by both Verdict and Signal Summary for consistency
    function getBollingerSignal(close, s) {
      if (s.bb_upper == null || s.bb_lower == null) return { sig: 'Neutral', pctB: null };
      const pctB = (close - s.bb_lower) / (s.bb_upper - s.bb_lower);
      const sig = pctB < 0.2 ? 'Buy' : pctB > 0.8 ? 'Sell' : 'Neutral';
      return { sig, pctB };
    }

    // 5-tier RSI classification — aligned with RSI_BUCKETS in stock-analyzer-contract.js
    function getRsiMeta(rsi) {
      if (!Number.isFinite(rsi)) return { zone: 'Unknown', signal: 'Neutral', color: 'var(--text-dim)' };
      if (rsi < 30) return { zone: 'Oversold',     signal: 'Buy',     color: 'var(--green)' };
      if (rsi < 45) return { zone: 'Soft Bearish', signal: 'Neutral', color: '#fb923c' };
      if (rsi < 55) return { zone: 'Neutral',      signal: 'Neutral', color: 'var(--text)' };
      if (rsi < 70) return { zone: 'Soft Bullish', signal: 'Neutral', color: 'var(--accent)' };
      return             { zone: 'Overbought',    signal: 'Sell',    color: 'var(--red)' };
    }

    // ─── 0. DECISION STRIP (above-the-fold, short/mid/long horizons) ─────────────
    function buildDecisionStrip(ticker, close, s, bars) {
      if (close == null) return '';

      function scoreHorizon(horizon) {
        let score = 0; const reasons = [];
        if (horizon === 'short') {
          // Price vs SMA20
          if (s.sma20 != null) { if (close > s.sma20) { score++; reasons.push('Price above SMA 20'); } else { score--; reasons.push('Price below SMA 20'); } }
          // MACD histogram
          if (s.macd_hist != null) { if (s.macd_hist > 0) { score++; reasons.push('MACD histogram positive'); } else { score--; reasons.push('MACD histogram negative'); } }
          // Bollinger %B (unified 3-state — same as Verdict)
          const bbShort = getBollingerSignal(close, s);
          if (bbShort.sig === 'Buy') { score += 0.5; reasons.push('Bollinger %B oversold'); }
          else if (bbShort.sig === 'Sell') { score -= 0.5; reasons.push('Bollinger %B overbought'); }
          // RSI oversold bounce
          const rsiMeta = getRsiMeta(s.rsi14);
          if (rsiMeta.zone === 'Oversold') { score += 0.5; reasons.push('RSI oversold — potential bounce'); }
          else if (rsiMeta.zone === 'Overbought') { score -= 0.5; reasons.push('RSI overbought — caution'); }
        } else if (horizon === 'mid') {
          // MA structure
          if (s.sma20 != null && s.sma50 != null && s.sma200 != null) {
            if (s.sma20 > s.sma50 && s.sma50 > s.sma200) { score += 2; reasons.push('Bullish MA stack (20>50>200)'); }
            else if (s.sma20 < s.sma50 && s.sma50 < s.sma200) { score -= 2; reasons.push('Bearish MA stack (20<50<200)'); }
            else reasons.push('Mixed MA alignment');
          }
          if (s.sma50 != null) { if (close > s.sma50) { score++; reasons.push('Price above SMA 50'); } else { score--; reasons.push('Price below SMA 50'); } }
          // 20d return
          if (s.ret_20d_pct != null) { if (s.ret_20d_pct > 0) score += 0.5; else score -= 0.5; }
        } else { // long
          if (s.sma200 != null) { if (close > s.sma200) { score += 2; reasons.push('Price above SMA 200'); } else { score -= 2; reasons.push('Price below SMA 200'); } }
          if (s.sma20 != null && s.sma50 != null && s.sma200 != null) {
            if (s.sma20 > s.sma50 && s.sma50 > s.sma200) { score++; reasons.push('Bullish long-term MA structure'); }
            else if (s.sma20 < s.sma50 && s.sma50 < s.sma200) { score--; reasons.push('Bearish long-term MA structure'); }
          }
          if (s.range_52w_pct != null) {
            const pct52 = (s.range_52w_pct * 100).toFixed(0);
            if (s.range_52w_pct > 0.95) { score += 1.5; reasons.push(`At 52W high (${pct52}% range) — strong momentum`); }
            else if (s.range_52w_pct > 0.9) { score++; reasons.push(`Near 52W high (${pct52}% range) — momentum intact`); }
            else if (s.range_52w_pct > 0.7) { score += 0.5; reasons.push(`Upper 52W range (${pct52}%) — positive positioning`); }
            else if (s.range_52w_pct < 0.1) { score -= 1.5; reasons.push(`Near 52W low (${pct52}% range) — severe weakness`); }
            else if (s.range_52w_pct < 0.2) { score--; reasons.push(`Lower 52W range (${pct52}%) — under pressure`); }
          }
        }
        return { score, reasons: reasons.slice(0, 3) };
      }

      function horizonVerdict(score) {
        if (score >= 2) return { label: 'BUY', cls: 'bullish', conf: score >= 3 ? 'HIGH' : 'MEDIUM', icon: '▲' };
        if (score <= -2) return { label: 'AVOID', cls: 'bearish', conf: score <= -3 ? 'HIGH' : 'MEDIUM', icon: '▼' };
        return { label: 'WAIT', cls: 'neutral', conf: Math.abs(score) >= 1 ? 'MEDIUM' : 'LOW', icon: '◆' };
      }

      // Nearest support/resistance for trigger/invalidation
      function nearestLevels() {
        const lvls = [];
        if (s.sma20 != null) lvls.push({ name: 'SMA 20', price: s.sma20 });
        if (s.sma50 != null) lvls.push({ name: 'SMA 50', price: s.sma50 });
        if (s.bb_lower != null) lvls.push({ name: 'BB Lower', price: s.bb_lower });
        if (s.bb_upper != null) lvls.push({ name: 'BB Upper', price: s.bb_upper });
        if (s.sma200 != null) lvls.push({ name: 'SMA 200', price: s.sma200 });
        if (s.low_52w != null) lvls.push({ name: '52W Low', price: s.low_52w });
        if (s.high_52w != null) lvls.push({ name: '52W High', price: s.high_52w });
        const supports = lvls.filter(l => l.price < close).sort((a, b) => b.price - a.price);
        const resistances = lvls.filter(l => l.price > close).sort((a, b) => a.price - b.price);
        return { s1: supports[0] || null, r1: resistances[0] || null };
      }

      const horizons = [
        { key: 'short', label: 'SHORT', sub: '1–5 days' },
        { key: 'mid',   label: 'MID',   sub: '1–12 weeks' },
        { key: 'long',  label: 'LONG',  sub: '6–24 months' },
      ];
      const { s1, r1 } = nearestLevels();
      const fmtCurLocal = v => v == null ? '—' : '$' + Number(v).toFixed(2);

      // Synthesis + Divergence detection
      const trendWord = (s.sma20 > s.sma50 && s.sma50 > s.sma200) ? 'uptrend' : (s.sma20 < s.sma50 && s.sma50 < s.sma200) ? 'downtrend' : 'mixed trend';
      const rsiZone = getRsiMeta(s.rsi14).zone.toLowerCase();
      const divergences = [];
      if (trendWord === 'downtrend' && (rsiZone === 'oversold')) divergences.push('Bearish trend with oversold bounce potential');
      if (trendWord === 'uptrend' && (rsiZone === 'overbought')) divergences.push('Bullish trend but overbought — pullback risk');
      if (s.macd_hist > 0 && s.sma200 != null && close < s.sma200) divergences.push('Momentum divergence — short-term strength in long-term downtrend');
      if (s.macd_hist < 0 && s.sma200 != null && close > s.sma200) divergences.push('Momentum divergence — short-term weakness in long-term uptrend');

      const cards = horizons.map(h => {
        const { score, reasons } = scoreHorizon(h.key);
        const { label, cls, conf, icon } = horizonVerdict(score);
        const trigger = r1 ? `Break above ${r1.name} (${fmtCurLocal(r1.price)})` : 'No near resistance';
        const invalidation = s1 ? `Loss of ${s1.name} (${fmtCurLocal(s1.price)})` : 'No near support';
        // CRV (Risk:Reward ratio from S/R levels)
        let crvHtml = '';
        if (s1 && r1) {
          const risk = Math.abs(close - s1.price);
          const reward = Math.abs(r1.price - close);
          const crvNum = risk > 0 ? reward / risk : 0;
          const crv = risk > 0 ? crvNum.toFixed(1) : '—';
          const crvCol = crvNum >= 2 ? 'var(--green)' : crvNum >= 1 ? 'var(--yellow)' : 'var(--red)';
          crvHtml = `<div style="font-size:.72rem;color:var(--text-dim);margin-top:.2rem">R:R <strong style="color:${crvCol}">${crv}:1</strong> (risk ${fmtCurLocal(risk)} / reward ${fmtCurLocal(reward)})</div>`;
        }
        return `<div class="decision-card ${cls}">
          <div class="decision-horizon">${h.label} <span class="decision-horizon-sub">${h.sub}</span></div>
          <div class="decision-verdict">${icon} ${label}</div>
          <div class="decision-conf">Confidence: <strong>${conf}</strong></div>
          <ul class="decision-reasons">${reasons.map(r => `<li>${r}</li>`).join('')}</ul>
          <div class="decision-trigger">▶ Trigger: ${trigger}</div>
          <div class="decision-invalid">✗ Structural Invalidation (S/R): ${invalidation}</div>
          ${crvHtml}
        </div>`;
      }).join('');

      return `<div class="section section-full decision-strip-section">
        <h2>⚡ Decision Strip <span style="font-size:0.7rem;color:var(--text-muted);text-transform:none;letter-spacing:0">multi-horizon analysis</span></h2>
        <div style="font-size:.68rem;color:var(--text-muted);margin-bottom:.5rem;text-align:center">Score ≥3 → HIGH confidence · Score ≥2 → MEDIUM · Score &lt;2 → LOW · BUY ≥+2 · AVOID ≤-2 · WAIT = in between</div>
        <div style="font-size:.82rem;color:var(--text);margin-bottom:.6rem;padding:.5rem .6rem;background:rgba(255,255,255,.02);border-radius:6px;border-left:3px solid var(--accent);line-height:1.5">
          ${ticker} is in a <strong>${trendWord}</strong> with RSI in <strong>${rsiZone}</strong> territory.
          ${divergences.length ? `<br><span style="color:var(--yellow)">⚠️ ${divergences.join(' · ')}</span>` : ''}
        </div>
        <div class="decision-strip">${cards}</div>
        <div style="font-size:0.68rem;color:var(--text-muted);margin-top:0.5rem;text-align:center">Not financial advice. Based on technical indicators only.</div>
      </div>`;
    }

    // ─── 1. TECHNICAL VERDICT ────────────────────────────────────────────────────
    function buildVerdict(close, s) {
      if (close == null) return '';
      let bullCount = 0, bearCount = 0;
      // MA stack
      if (s.sma20 > s.sma50 && s.sma50 > s.sma200) bullCount += 2;
      else if (s.sma20 < s.sma50 && s.sma50 < s.sma200) bearCount += 2;
      // Price vs MAs (null-guarded — missing SMA must not count)
      if (s.sma20 != null) { if (close > s.sma20) bullCount++; else bearCount++; }
      if (s.sma50 != null) { if (close > s.sma50) bullCount++; else bearCount++; }
      if (s.sma200 != null) { if (close > s.sma200) bullCount++; else bearCount++; }
      // RSI
      const rsiMeta = getRsiMeta(s.rsi14);
      if (rsiMeta.signal === 'Buy') bullCount++;
      else if (rsiMeta.signal === 'Sell') bearCount++;
      // MACD
      if (s.macd_hist > 0) bullCount++; else if (s.macd_hist < 0) bearCount++;
      // Bollinger %B (unified 3-state logic — same as Signal Summary)
      const bbSig = getBollingerSignal(close, s);
      if (bbSig.sig === 'Buy') bullCount++; else if (bbSig.sig === 'Sell') bearCount++;

      const total = bullCount + bearCount;
      const ratio = total > 0 ? bullCount / total : 0.5;
      let verdict, cls;
      if (ratio >= 0.65) { verdict = '▲ BULLISH'; cls = 'bullish'; }
      else if (ratio <= 0.35) { verdict = '▼ BEARISH'; cls = 'bearish'; }
      else { verdict = '◆ NEUTRAL'; cls = 'neutral'; }

      return `<div class="section section-full">
      <h2>🎯 Technical Verdict <span style="font-size:0.7rem;color:var(--text-muted);text-transform:none;letter-spacing:0">1-20d signal blend</span></h2>
      <div class="verdict-box ${cls}">${verdict}</div>
      <div class="verdict-detail">${bullCount} bullish signals, ${bearCount} bearish signals from MA, RSI, MACD, and Bollinger analysis</div>
    </div>`;
    }

    // ─── 2. MOVING AVERAGE RADAR ─────────────────────────────────────────────────
    function buildMASection(close, s) {
      if (close == null) return '';
      const mas = [
        { name: 'SMA 20', val: s.sma20, key: 'sma20' },
        { name: 'SMA 50', val: s.sma50, key: 'sma50' },
        { name: 'SMA 200', val: s.sma200, key: 'sma200' },
        { name: 'EMA 12', val: s.ema12, key: 'ema12' },
        { name: 'EMA 26', val: s.ema26, key: 'ema26' },
      ];

      // Stack detection
      let stackLabel, stackCls;
      if (s.sma20 > s.sma50 && s.sma50 > s.sma200) { stackLabel = '▲ Bullish Stack (20 > 50 > 200)'; stackCls = 'bullish'; }
      else if (s.sma20 < s.sma50 && s.sma50 < s.sma200) { stackLabel = '▼ Bearish Stack (20 < 50 < 200)'; stackCls = 'bearish'; }
      else { stackLabel = '◆ Mixed Alignment'; stackCls = 'mixed'; }

      // EMA crossover
      const emaCross = s.ema12 != null && s.ema26 != null
        ? (s.ema12 > s.ema26 ? '🟢 EMA 12 > 26 (Short-term bullish)' : '🔴 EMA 12 < 26 (Short-term bearish)')
        : '';

      const rows = mas.map(m => {
        if (m.val == null) return '';
        const above = close >= m.val;
        const dist = ((close - m.val) / m.val * 100).toFixed(2);
        return `<tr>
        <td style="font-weight:600">${m.name}</td>
        <td>${fmtCur(m.val)}</td>
        <td><span class="ma-pos ${above ? 'above' : 'below'}">${above ? '▲ Above' : '▼ Below'}</span></td>
        <td style="color:${above ? 'var(--green)' : 'var(--red)'}; font-weight:700">${dist > 0 ? '+' : ''}${dist}%</td>
      </tr>`;
      }).join('');

      return `<div class="section section-full">
      <h2>📐 Moving Average Radar</h2>
      <div class="stack-badge ${stackCls}">${stackLabel}</div>
      ${emaCross ? `<div style="font-size:0.85rem;margin-bottom:0.75rem;color:var(--text-dim)">${emaCross}</div>` : ''}
      <table class="ma-table">
        <tr><th>Moving Average</th><th>Value</th><th>Position</th><th>Distance</th></tr>
        ${rows}
      </table>
    </div>`;
    }

    // ─── 3. OSCILLATORS & MOMENTUM ───────────────────────────────────────────────
    function buildOscillators(close, s) {
      // RSI Gauge
      const rsi = s.rsi14;
      const rsiMeta = getRsiMeta(rsi);
      const rsiZone = rsiMeta.zone;
      const rsiColor = rsiMeta.color;
      const rsiGauge = rsi != null ? `
      <div class="gauge">
        <div class="gauge-header">
          <span class="gauge-label">RSI (14)</span>
          <span class="gauge-value" style="color:${rsiColor}">${fmt(rsi, 1)} — ${rsiZone}</span>
        </div>
        <div class="gauge-bar">
          <div class="gauge-zones">
            <div class="gauge-zone" style="width:30%;background:rgba(16,185,129,0.15)"></div>
            <div class="gauge-zone" style="width:40%;background:rgba(148,163,184,0.05)"></div>
            <div class="gauge-zone" style="width:30%;background:rgba(248,113,113,0.15)"></div>
          </div>
          <div class="gauge-marker" style="left:${clamp(rsi, 0, 100)}%"></div>
        </div>
        <div class="gauge-ticks"><span>0 (Oversold)</span><span>30</span><span>50</span><span>70</span><span>100 (Overbought)</span></div>
      </div>` : '';

      // MACD
      const macdOk = s.macd != null;
      const macdDir = s.macd_hist > 0 ? 'Bullish' : 'Bearish';
      const macdCross = s.macd > s.macd_signal ? '🟢 MACD above Signal' : '🔴 MACD below Signal';
      const macdHist = `<div class="gauge">
      <div class="gauge-header">
        <span class="gauge-label">MACD</span>
        <span class="gauge-value">${macdOk ? `${fmt(s.macd, 3)} — ${macdDir}` : '—'}</span>
      </div>
      ${macdOk ? `<div class="m-grid" style="margin-top:0.5rem;">
        <div class="m-item"><div class="m-label">MACD Line</div><div class="m-val">${fmt(s.macd, 3)}</div></div>
        <div class="m-item"><div class="m-label">Signal Line</div><div class="m-val">${fmt(s.macd_signal, 3)}</div></div>
        <div class="m-item"><div class="m-label">Histogram</div><div class="m-val" style="color:${s.macd_hist >= 0 ? 'var(--green)' : 'var(--red)'}">${fmt(s.macd_hist, 3)}</div></div>
        <div class="m-item"><div class="m-label">Crossover</div><div class="m-val" style="font-size:0.85rem">${macdCross}</div></div>
      </div>` : ''}
    </div>`;

      // Bollinger Bands
      let bbHTML = '';
      if (s.bb_upper != null && close != null) {
        const bbWidth = s.bb_upper - s.bb_lower;
        const bbPos = bbWidth > 0 ? ((close - s.bb_lower) / bbWidth) * 100 : 50;
        const pctB = bbWidth > 0 ? ((close - s.bb_lower) / bbWidth).toFixed(2) : '—';
        const bbZone = bbPos > 80 ? 'Near Upper (Overbought)' : bbPos < 20 ? 'Near Lower (Oversold)' : 'Mid Range';
        bbHTML = `<div class="gauge">
        <div class="gauge-header">
          <span class="gauge-label">Bollinger Bands</span>
          <span class="gauge-value">%B: ${pctB} — ${bbZone}</span>
        </div>
        <div class="gauge-bar">
          <div class="gauge-zones">
            <div class="gauge-zone" style="width:20%;background:rgba(16,185,129,0.15)"></div>
            <div class="gauge-zone" style="width:60%;background:rgba(148,163,184,0.05)"></div>
            <div class="gauge-zone" style="width:20%;background:rgba(248,113,113,0.15)"></div>
          </div>
          <div class="gauge-marker" style="left:${clamp(bbPos, 2, 98)}%"></div>
        </div>
        <div class="gauge-ticks"><span>Lower ${fmtCur(s.bb_lower)}</span><span>Mid ${fmtCur(s.bb_mid)}</span><span>Upper ${fmtCur(s.bb_upper)}</span></div>
      </div>`;
      }

      return `<div class="section section-full">
      <h2>📊 Oscillators & Momentum</h2>
      ${rsiGauge}
      ${macdHist}
      ${bbHTML}
    </div>`;
    }

    // ─── 4. PERFORMANCE TIMELINE ─────────────────────────────────────────────────
    function buildPerformance(s) {
      const periods = [
        { label: '1 Day', val: s.ret_1d_pct },
        { label: '5 Day', val: s.ret_5d_pct },
        { label: '20 Day', val: s.ret_20d_pct },
      ];

      const maxAbs = Math.max(...periods.map(p => Math.abs(p.val || 0)), 0.01);
      const rows = periods.map(p => {
        if (p.val == null) return '';
        const isPos = p.val >= 0;
        const barWidth = Math.abs(p.val) / maxAbs * 50; // 50% max width
        const barStyle = isPos
          ? `right:50%; width:${barWidth}%; border-radius: 4px 0 0 4px;`
          : `left:50%; width:${barWidth}%; border-radius: 0 4px 4px 0;`;
        return `<div class="perf-item">
        <span class="perf-label">${p.label}</span>
        <div class="perf-bar-container">
          <div class="perf-center"></div>
          <div class="perf-bar ${isPos ? 'positive' : 'negative'}" style="${barStyle}"></div>
        </div>
        <span class="perf-val ${isPos ? 'positive' : 'negative'}">${fmtPctSigned(p.val)}</span>
      </div>`;
      }).join('');

      // Autocorrelation
      const ac = s.lag1_autocorrelation;
      const acText = ac != null ? (ac > 0.1 ? '🔄 Momentum trending (positive autocorrelation)' :
        ac < -0.1 ? '↩️ Mean-reverting (negative autocorrelation)' : '➡️ No significant trend persistence') : '';

      return `<div class="section">
      <h2>📈 Performance</h2>
      ${rows}
      ${acText ? `<div style="font-size:0.78rem;color:var(--text-dim);margin-top:0.5rem">${acText}</div>` : ''}
    </div>`;
    }

    // ─── 5. VOLATILITY & RISK ────────────────────────────────────────────────────
    function buildVolatility(close, s) {
      const vp = s.volatility_percentile;
      const vpLabel = vp != null ? (vp > 80 ? 'High volatility' : vp > 50 ? 'Normal volatility' : 'Low volatility') : '';
      const vpColor = vp > 80 ? 'var(--red)' : vp > 50 ? 'var(--yellow)' : 'var(--green)';

      const vpGauge = vp != null ? `<div class="gauge">
      <div class="gauge-header">
        <span class="gauge-label">Volatility Percentile</span>
        <span class="gauge-value" style="color:${vpColor}">${fmt(vp, 0)}th — ${vpLabel}</span>
      </div>
      <div class="gauge-bar">
        <div class="gauge-fill" style="width:${clamp(vp, 0, 100)}%;background:linear-gradient(90deg,var(--green),var(--yellow),var(--red))"></div>
      </div>
      <div class="gauge-ticks"><span>Low</span><span>Moderate</span><span>High</span></div>
    </div>` : '';

      const atrPct = close > 0 && s.atr14 ? (s.atr14 / close * 100).toFixed(2) : null;
      const metrics = [
        { label: 'ATR (14)', val: fmtCur(s.atr14), sub: atrPct ? `${atrPct}% of price` : '' },
        { label: '20d Volatility', val: fmtPct(s.volatility_20d), sub: '' },
        { label: '20d Std Dev', val: fmtCur(s.rolling_std_20), sub: '' },
        { label: '52W Range %', val: fmtPct(s.range_52w_pct), sub: '' },
      ];

      return `<div class="section">
      <h2>⚡ Volatility & Risk</h2>
      ${vpGauge}
      <div class="m-grid" style="margin-top:0.5rem;">
        ${metrics.map(m => `<div class="m-item"><div class="m-label">${m.label}</div><div class="m-val">${m.val}</div>${m.sub ? `<div class="m-sub">${m.sub}</div>` : ''}</div>`).join('')}
      </div>
    </div>`;
    }

    // ─── 6. VOLUME ANALYSIS ──────────────────────────────────────────────────────
    function buildVolume(s, bars) {
      const ratio = s.volume_ratio_20d;
      const avgVol = s.avg_volume_20d;
      const hasVolume = ratio != null && ratio > 0;

      // Volume trend from last bars
      let volTrend = '';
      if (bars.length >= 10) {
        const recent5 = bars.slice(-5).reduce((a, b) => a + (b.volume || 0), 0) / 5;
        const prior5 = bars.slice(-10, -5).reduce((a, b) => a + (b.volume || 0), 0) / 5;
        if (recent5 > 0 && prior5 > 0) {
          const chg = ((recent5 - prior5) / prior5 * 100).toFixed(0);
          volTrend = recent5 > prior5 ? `📈 Volume rising (${chg > 0 ? '+' : ''}${chg}% vs prior 5d)` : `📉 Volume dropping (${chg}% vs prior 5d)`;
        }
      }

      if (!hasVolume && !volTrend) return '';

      const ratioBar = hasVolume ? `<div class="gauge">
      <div class="gauge-header">
        <span class="gauge-label">Volume vs 20d Average</span>
        <span class="gauge-value" style="color:${ratio > 1.5 ? 'var(--green)' : ratio < 0.5 ? 'var(--red)' : 'var(--text)'}">${fmt(ratio, 2)}x</span>
      </div>
      <div class="gauge-bar">
        <div class="gauge-fill" style="width:${clamp(ratio / 3 * 100, 2, 100)}%;background:${ratio > 1.5 ? 'var(--green)' : ratio < 0.5 ? 'var(--red)' : 'var(--accent)'}"></div>
      </div>
      <div class="gauge-ticks"><span>0x</span><span>1x Avg</span><span>2x</span><span>3x+</span></div>
    </div>` : '';

      return `<div class="section">
      <h2>📊 Volume</h2>
      ${ratioBar}
      ${avgVol ? `<div style="font-size:0.8rem;color:var(--text-dim);margin-top:0.25rem">20d Average: ${fmtVol(avgVol)}</div>` : ''}
      ${volTrend ? `<div style="font-size:0.8rem;color:var(--text-dim);margin-top:0.5rem">${volTrend}</div>` : ''}
    </div>`;
    }

    // ─── 7. SUPPORT & RESISTANCE LEVELS ──────────────────────────────────────────
    function buildLevels(close, s, bars) {
      if (close == null) return '';
      const rawLevels = [];
      if (s.high_52w != null) rawLevels.push({ name: '52W High', price: s.high_52w });
      if (s.bb_upper != null) rawLevels.push({ name: 'BB Upper', price: s.bb_upper });
      if (s.sma20  != null) rawLevels.push({ name: 'SMA 20',  price: s.sma20 });
      if (s.sma50  != null) rawLevels.push({ name: 'SMA 50',  price: s.sma50 });
      if (s.sma200 != null) rawLevels.push({ name: 'SMA 200', price: s.sma200 });
      if (s.bb_lower != null) rawLevels.push({ name: 'BB Lower', price: s.bb_lower });
      if (s.low_52w  != null) rawLevels.push({ name: '52W Low', price: s.low_52w });

      // ATR bands (±1, ±2)
      if (s.atr14 != null) {
        rawLevels.push({ name: 'ATR +1', price: close + s.atr14 });
        rawLevels.push({ name: 'ATR -1', price: close - s.atr14 });
      }

      // Swing High / Swing Low from last 20 bars
      if (bars && bars.length >= 5) {
        const recent = bars.slice(-20);
        const swingHigh = Math.max(...recent.map(b => b.high || b.close || 0));
        const swingLow  = Math.min(...recent.map(b => b.low  || b.close || Infinity));
        if (swingHigh > close) rawLevels.push({ name: 'Swing High (20d)', price: swingHigh });
        if (swingLow  < close) rawLevels.push({ name: 'Swing Low (20d)',  price: swingLow });
      }

      // Deduplicate by proximity (within 0.3% of each other)
      const deduped = [];
      for (const l of rawLevels) {
        if (!rawLevels.some(o => o !== l && Math.abs(o.price - l.price) / close < 0.003 && deduped.indexOf(o) >= 0)) {
          deduped.push(l);
        }
      }

      const supports    = deduped.filter(l => l.price < close).sort((a, b) => b.price - a.price).slice(0, 4);
      const resistances = deduped.filter(l => l.price > close).sort((a, b) => a.price - b.price).slice(0, 4);

      const s1 = supports[0]    || null;
      const r1 = resistances[0] || null;

      // S1/R1 summary header
      const srSummary = `<div class="sr-summary">
        <div class="sr-item support${s1 ? '' : ' empty'}">
          <div class="sr-label">S1 — Nearest Support</div>
          <div class="sr-price">${s1 ? fmtCur(s1.price) : '—'}</div>
          <div class="sr-name">${s1 ? s1.name : 'None nearby'}</div>
          <div class="sr-dist">${s1 ? ((s1.price - close) / close * 100).toFixed(1) + '%' : ''}</div>
          ${s1 ? `<div class="sr-invalid">✗ Invalidation if breaks below</div>` : ''}
        </div>
        <div class="sr-current">
          <div class="sr-label">Current</div>
          <div class="sr-price" style="color:var(--accent)">${fmtCur(close)}</div>
        </div>
        <div class="sr-item resistance${r1 ? '' : ' empty'}">
          <div class="sr-label">R1 — Nearest Resistance</div>
          <div class="sr-price">${r1 ? fmtCur(r1.price) : '—'}</div>
          <div class="sr-name">${r1 ? r1.name : 'None nearby'}</div>
          <div class="sr-dist">${r1 ? '+' + ((r1.price - close) / close * 100).toFixed(1) + '%' : ''}</div>
          ${r1 ? `<div class="sr-trigger">▶ Trigger: Break above</div>` : ''}
        </div>
      </div>`;

      const allSorted = [...resistances.reverse(), { name: 'Current Price', price: close, type: 'current' }, ...supports];
      allSorted.sort((a, b) => b.price - a.price);

      const html = allSorted.map(l => {
        const type = l.type === 'current' ? 'current' : l.price > close ? 'resistance' : 'support';
        const dist = type === 'current' ? '' : `${((l.price - close) / close * 100).toFixed(1)}%`;
        const isKey = l === s1 || l === r1;
        return `<div class="level-item ${type}${isKey ? ' key-level' : ''}">
          <span class="level-name">${l.name}${isKey ? (l === s1 ? ' <strong>S1</strong>' : ' <strong>R1</strong>') : ''}</span>
          <span><span class="level-price">${fmtCur(l.price)}</span><span class="level-dist">${dist}</span></span>
        </div>`;
      }).join('');

      return `<div class="section section-full">
        <h2>🎚️ Key Levels</h2>
        ${srSummary}
        <div class="levels-list" style="margin-top:0.75rem">${html}</div>
      </div>`;
    }

    // ─── 8. SIGNAL SUMMARY TABLE ─────────────────────────────────────────────────
    function buildSignals(close, s) {
      if (close == null) return '';
      const signals = [];

      // MA signals
      if (s.sma20 != null) signals.push({ name: 'Price vs SMA 20', sig: close > s.sma20 ? 'Buy' : 'Sell', detail: `${close > s.sma20 ? 'Above' : 'Below'} (${((close - s.sma20) / s.sma20 * 100).toFixed(1)}%)` });
      if (s.sma50 != null) signals.push({ name: 'Price vs SMA 50', sig: close > s.sma50 ? 'Buy' : 'Sell', detail: `${close > s.sma50 ? 'Above' : 'Below'} (${((close - s.sma50) / s.sma50 * 100).toFixed(1)}%)` });
      if (s.sma200 != null) signals.push({ name: 'Price vs SMA 200', sig: close > s.sma200 ? 'Buy' : 'Sell', detail: `${close > s.sma200 ? 'Above' : 'Below'} (${((close - s.sma200) / s.sma200 * 100).toFixed(1)}%)` });

      // MA Stack
      if (s.sma20 != null && s.sma50 != null && s.sma200 != null) {
        const stack = s.sma20 > s.sma50 && s.sma50 > s.sma200 ? 'Buy' : s.sma20 < s.sma50 && s.sma50 < s.sma200 ? 'Sell' : 'Neutral';
        signals.push({ name: 'MA Alignment', sig: stack, detail: stack === 'Buy' ? 'Bullish stack' : stack === 'Sell' ? 'Bearish stack' : 'Mixed order' });
      }

      // EMA cross
      if (s.ema12 != null && s.ema26 != null) {
        signals.push({ name: 'EMA 12/26 Cross', sig: s.ema12 > s.ema26 ? 'Buy' : 'Sell', detail: s.ema12 > s.ema26 ? 'Bullish crossover' : 'Bearish crossover' });
      }

      // RSI
      if (s.rsi14 != null) {
        const rsiSig = getRsiMeta(s.rsi14).signal;
        signals.push({ name: 'RSI (14)', sig: rsiSig, detail: `${s.rsi14.toFixed(1)}` });
      }

      // MACD
      if (s.macd_hist != null) {
        signals.push({ name: 'MACD Histogram', sig: s.macd_hist > 0 ? 'Buy' : 'Sell', detail: `${s.macd_hist.toFixed(3)}` });
      }

      // Bollinger (unified 3-state — same logic as Verdict)
      const bbSignal = getBollingerSignal(close, s);
      if (bbSignal.pctB != null) {
        signals.push({ name: 'Bollinger %B', sig: bbSignal.sig, detail: `${bbSignal.pctB.toFixed(2)}` });
      }

      const rows = signals.map(sig => {
        const cls = sig.sig === 'Buy' ? 'buy' : sig.sig === 'Sell' ? 'sell' : 'neutral';
        return `<tr>
        <td style="font-weight:600">${sig.name}</td>
        <td><span class="signal-chip ${cls}">${sig.sig}</span></td>
        <td style="color:var(--text-dim);font-size:0.8rem">${sig.detail}</td>
      </tr>`;
      }).join('');

      const buyCount = signals.filter(s => s.sig === 'Buy').length;
      const sellCount = signals.filter(s => s.sig === 'Sell').length;
      const neutralCount = signals.filter(s => s.sig === 'Neutral').length;

      return `<div class="section section-full">
      <h2>📋 Signal Summary <span style="font-size:0.7rem;color:var(--text-muted);text-transform:none;letter-spacing:0">unified methodology with verdict</span></h2>
      <div style="display:flex;gap:0.5rem;margin-bottom:0.75rem;flex-wrap:wrap;">
        <span class="signal-chip buy">Buy: ${buyCount}</span>
        <span class="signal-chip sell">Sell: ${sellCount}</span>
        <span class="signal-chip neutral">Neutral: ${neutralCount}</span>
      </div>
      <table class="sig-table">
        <tr><th>Indicator</th><th>Signal</th><th>Detail</th></tr>
        ${rows}
      </table>
    </div>`;
    }

    // ─── 9. MARKET SCORE ─────────────────────────────────────────────────────────
    function buildScore(score) {
      if (!score || Object.keys(score).length === 0) return '';

      const chipClass = v => v >= 70 ? 'positive' : v <= 40 ? 'negative' : 'n';

      const reasonsHTML = (list, title) => {
        if (!list || !list.length) return '';
        const items = list.map(e => `<div class="score-reason">${e.metric}: ${fmtPctSigned(e.points)}</div>`).join('');
        return `<div class="score-reason-group"><h3>${title}</h3>${items}</div>`;
      };

      return `<div class="section section-full">
      <h2>🏆 Market Score</h2>
      <div class="score-chips">
        <span class="score-chip ${chipClass(score.score_short)}">Short: ${score.score_short ?? '—'}</span>
        <span class="score-chip ${chipClass(score.score_mid)}">Mid: ${score.score_mid ?? '—'}</span>
        <span class="score-chip ${chipClass(score.score_long)}">Long: ${score.score_long ?? '—'}</span>
      </div>
      ${score.confidence != null ? `<div style="font-size:0.8rem;color:var(--text-dim);margin-bottom:0.5rem">Confidence: ${score.confidence}</div>` : ''}
      <div class="score-reasons">
        ${reasonsHTML(score.reasons_top?.short, 'Short horizon')}
        ${reasonsHTML(score.reasons_top?.mid, 'Mid horizon')}
        ${reasonsHTML(score.reasons_top?.long, 'Long horizon')}
      </div>
    </div>`;
    }

    // ─── Helper: prefer adjClose over raw close ─────────────────────────────────
    const adjC = (bar) => bar?.adjClose ?? bar?.close ?? null;

    // ─── 10. SEASONALITY ────────────────────────────────────────────────────────
    function buildSeasonality(bars) {
      if (!bars || bars.length < 252) return ''; // Need at least 1 year
      const monthNames = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
      const monthReturns = {};
      monthNames.forEach((_, i) => { monthReturns[i] = []; });

      for (let i = 1; i < bars.length; i++) {
        const prev = bars[i - 1];
        const cur = bars[i];
        const prevC = adjC(prev), curC = adjC(cur);
        if (!cur.date || !prevC || !curC || prevC <= 0) continue;
        const d = new Date(cur.date);
        if (isNaN(d)) continue;
        const ret = (curC - prevC) / prevC;
        monthReturns[d.getMonth()].push(ret);
      }

      const rows = monthNames.map((name, i) => {
        const rets = monthReturns[i];
        if (!rets.length) return `<div style="display:flex;justify-content:space-between;padding:0.3rem 0;border-bottom:1px solid rgba(255,255,255,0.03);"><span style="color:var(--text-dim);width:40px;">${name}</span><span style="color:var(--text-muted)">—</span></div>`;
        const avg = rets.reduce((a, b) => a + b, 0) / rets.length;
        const pct = (avg * 100).toFixed(2);
        const color = avg >= 0 ? 'var(--green)' : 'var(--red)';
        const sign = avg >= 0 ? '+' : '';
        const barW = Math.min(Math.abs(avg) * 1000, 60);
        return `<div style="display:flex;align-items:center;gap:0.5rem;padding:0.3rem 0;border-bottom:1px solid rgba(255,255,255,0.03);">
          <span style="color:var(--text-dim);width:40px;font-size:0.8rem;">${name}</span>
          <div style="flex:1;height:14px;position:relative;background:rgba(148,163,184,0.04);border-radius:3px;">
            <div style="position:absolute;${avg >= 0 ? 'left:50%' : 'right:50%'};width:${barW}%;height:100%;background:${color};opacity:0.5;border-radius:3px;"></div>
            <div style="position:absolute;left:50%;top:0;bottom:0;width:1px;background:rgba(148,163,184,0.15);"></div>
          </div>
          <span style="color:${color};font-weight:700;font-size:0.8rem;width:60px;text-align:right;">${sign}${pct}%</span>
        </div>`;
      }).join('');

      // Best/worst month
      let bestMonth = '', worstMonth = '', bestAvg = -Infinity, worstAvg = Infinity;
      monthNames.forEach((name, i) => {
        const rets = monthReturns[i];
        if (!rets.length) return;
        const avg = rets.reduce((a, b) => a + b, 0) / rets.length;
        if (avg > bestAvg) { bestAvg = avg; bestMonth = name; }
        if (avg < worstAvg) { worstAvg = avg; worstMonth = name; }
      });

      return `<div class="section">
      <h2>📅 Seasonality</h2>
      <div style="font-size:0.78rem;color:var(--text-dim);margin-bottom:0.6rem;">Average monthly returns over available history (${Math.floor(bars.length / 252)} years)</div>
      ${rows}
      <div style="display:flex;gap:1rem;margin-top:0.6rem;font-size:0.78rem;">
        <span style="color:var(--green);">🏆 Best: ${bestMonth} (${bestAvg > 0 ? '+' : ''}${(bestAvg * 100).toFixed(2)}%)</span>
        <span style="color:var(--red);">⚠️ Worst: ${worstMonth} (${(worstAvg * 100).toFixed(2)}%)</span>
      </div>
      ${typeof buildWeekdaySeasonality === 'function' ? buildWeekdaySeasonality(bars) : ''}
    </div>`;
    }

    // ─── 11. CORRELATIONS & BENCHMARKS ──────────────────────────────────────────
    function buildCorrelations(ticker, bars) {
      if (!bars || bars.length < 60) return ''; // Need at minimum 60 bars

      // We compute "self-correlation" metrics: autocorrelation and momentum persistence
      const returns = [];
      for (let i = 1; i < bars.length; i++) {
        const prev = adjC(bars[i - 1]);
        const cur = adjC(bars[i]);
        if (prev > 0 && cur > 0) returns.push((cur - prev) / prev);
      }
      if (returns.length < 30) return '';

      // Compute rolling 20d returns stats
      const recent20 = returns.slice(-20);
      const recent60 = returns.slice(-60);
      const avgRet20 = recent20.reduce((a, b) => a + b, 0) / recent20.length;
      const avgRet60 = recent60.reduce((a, b) => a + b, 0) / recent60.length;
      const winRate20 = (recent20.filter(r => r > 0).length / recent20.length * 100).toFixed(1);
      const winRate60 = (recent60.filter(r => r > 0).length / recent60.length * 100).toFixed(1);

      // Compute simple volatility
      const vol20 = Math.sqrt(recent20.reduce((a, r) => a + (r - avgRet20) ** 2, 0) / (recent20.length - 1)) * Math.sqrt(252);
      const vol60 = Math.sqrt(recent60.reduce((a, r) => a + (r - avgRet60) ** 2, 0) / (recent60.length - 1)) * Math.sqrt(252);

      // Autocorrelation (lag-1)
      let autoCorr = 0;
      if (returns.length > 2) {
        const n = Math.min(returns.length - 1, 60);
        const slice = returns.slice(-n - 1);
        const mean = slice.reduce((a, b) => a + b, 0) / slice.length;
        let num = 0, den = 0;
        for (let i = 1; i < slice.length; i++) {
          num += (slice[i] - mean) * (slice[i - 1] - mean);
          den += (slice[i] - mean) ** 2;
        }
        autoCorr = den > 0 ? num / den : 0;
      }
      const acLabel = autoCorr > 0.1 ? '🔄 Trending (momentum)' : autoCorr < -0.1 ? '↩️ Mean-reverting' : '➡️ Random walk';

      // Benchmark comparison note
      const benchmarks = ['SPY', 'QQQ', 'DIA', 'IWM'];
      const benchNote = benchmarks.includes(ticker.toUpperCase())
        ? `<div style="font-size:0.78rem;color:var(--accent);margin-top:0.5rem;">ℹ️ ${ticker} is itself a major benchmark index ETF.</div>`
        : `<div style="font-size:0.78rem;color:var(--text-muted);margin-top:0.5rem;">💡 Cross-correlations to SPY, QQQ, DIA, and IWM require benchmark data in the universe.</div>`;

      return `<div class="section">
      <h2>🔗 Return Profile & Regime</h2>
      <table class="ma-table">
        <tr><th>Metric</th><th>20-Day</th><th>60-Day</th></tr>
        <tr><td style="font-weight:600">Avg Daily Return</td><td style="color:${avgRet20 >= 0 ? 'var(--green)' : 'var(--red)'}">${avgRet20 >= 0 ? '+' : ''}${(avgRet20 * 100).toFixed(3)}%</td><td style="color:${avgRet60 >= 0 ? 'var(--green)' : 'var(--red)'}">${avgRet60 >= 0 ? '+' : ''}${(avgRet60 * 100).toFixed(3)}%</td></tr>
        <tr><td style="font-weight:600">Win Rate</td><td>${winRate20}%</td><td>${winRate60}%</td></tr>
        <tr><td style="font-weight:600" title="Sample standard deviation of daily returns, annualized (×√252 trading days)">Annualized Vol</td><td>${(vol20 * 100).toFixed(1)}%</td><td>${(vol60 * 100).toFixed(1)}%</td></tr>
      </table>
      <div style="margin-top:0.75rem;padding:0.5rem;background:rgba(255,255,255,0.02);border-radius:6px;border-left:3px solid var(--accent);">
        <div style="font-size:0.78rem;color:var(--text-dim);margin-bottom:0.2rem;">Autocorrelation (lag-1, 60d)</div>
        <div style="font-weight:700;font-size:0.9rem;">${autoCorr.toFixed(3)} ${acLabel}</div>
      </div>
      ${benchNote}
    </div>`;
    }

    // ─── 12. PRICE CONCLUSION ───────────────────────────────────────────────────
    function buildPriceConclusion(ticker, close, s, bars, universe) {
      if (close == null) return '';
      const points = [];
      let bullScore = 0, bearScore = 0;

      // MA Analysis
      if (s.sma200 != null) {
        const distSMA200 = ((close - s.sma200) / s.sma200 * 100);
        if (close > s.sma200) {
          points.push(`✅ Price is <strong>${distSMA200.toFixed(1)}% above SMA200</strong> — long-term uptrend intact.`);
          bullScore += 2;
        } else {
          points.push(`⚠️ Price is <strong>${Math.abs(distSMA200).toFixed(1)}% below SMA200</strong> — long-term trend is bearish.`);
          bearScore += 2;
        }
      }
      if (s.sma20 != null && s.sma50 != null && s.sma200 != null) {
        if (s.sma20 > s.sma50 && s.sma50 > s.sma200) {
          points.push('✅ All moving averages are in <strong>bullish alignment</strong> (20 > 50 > 200).');
          bullScore += 2;
        } else if (s.sma20 < s.sma50 && s.sma50 < s.sma200) {
          points.push('🔴 Moving averages show <strong>bearish death cross</strong> alignment (20 < 50 < 200).');
          bearScore += 2;
        } else {
          points.push('◆ Moving average alignment is <strong>mixed</strong> — no clear directional signal.');
        }
      }

      // RSI
      if (s.rsi14 != null) {
        const rsiMeta = getRsiMeta(s.rsi14);
        if (rsiMeta.signal === 'Buy') {
          points.push(`🟢 RSI at <strong>${s.rsi14.toFixed(1)}</strong> — oversold territory, potential bounce setup.`);
          bullScore += 1;
        } else if (rsiMeta.signal === 'Sell') {
          points.push(`🔴 RSI at <strong>${s.rsi14.toFixed(1)}</strong> — overbought, caution for pullback.`);
          bearScore += 1;
        } else {
          points.push(`➡️ RSI at <strong>${s.rsi14.toFixed(1)}</strong> — neutral zone, no extreme signal.`);
        }
      }

      // 52W Range — tiered, uses range_52w_pct for consistency with Decision Strip
      if (s.high_52w != null && s.low_52w != null) {
        const fromHigh = ((close - s.high_52w) / s.high_52w * 100);
        const fromLow = ((close - s.low_52w) / s.low_52w * 100);
        const pct52 = s.range_52w_pct != null ? (s.range_52w_pct * 100).toFixed(0) : null;
        if (s.range_52w_pct > 0.9) {
          points.push(`🏔️ Trading near <strong>52-week high</strong> (${fromHigh.toFixed(1)}% from peak, ${pct52}% of range) — momentum intact but elevated risk.`);
          bullScore += 1;
        } else if (s.range_52w_pct > 0.7) {
          points.push(`📈 Upper <strong>52-week range</strong> (${pct52}% position, ${fromHigh.toFixed(1)}% from peak) — positive trend positioning.`);
          bullScore += 0.5;
        } else if (s.range_52w_pct < 0.1) {
          points.push(`🕳️ Near <strong>52-week low</strong> (${fromLow.toFixed(1)}% from bottom, ${pct52}% of range) — severe weakness, falling knife risk.`);
          bearScore += 1.5;
        } else if (s.range_52w_pct < 0.2) {
          points.push(`🕳️ Lower <strong>52-week range</strong> (${fromLow.toFixed(1)}% from bottom, ${pct52}% of range) — under pressure, potential value.`);
          bearScore += 1;
        }
      }

      // Volatility
      if (s.volatility_percentile != null) {
        if (s.volatility_percentile > 80) {
          points.push(`⚡ Volatility is in the <strong>${s.volatility_percentile.toFixed(0)}th percentile</strong> — unusually high, expect large swings.`);
        } else if (s.volatility_percentile < 20) {
          points.push(`🧊 Volatility is in the <strong>${s.volatility_percentile.toFixed(0)}th percentile</strong> — quiet period, breakout may be imminent.`);
        }
      }

      // Volume
      if (s.volume_ratio_20d != null) {
        if (s.volume_ratio_20d > 2) {
          points.push(`📢 Volume is <strong>${s.volume_ratio_20d.toFixed(1)}x</strong> the 20-day average — significant institutional activity.`);
        } else if (s.volume_ratio_20d < 0.5) {
          points.push(`🔇 Volume is only <strong>${s.volume_ratio_20d.toFixed(1)}x</strong> the average — low conviction in current move.`);
        }
      }

      // Seasonality hint
      if (bars && bars.length >= 252) {
        const now = new Date();
        const curMonth = now.getMonth();
        const monthNames = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
        const monthRets = [];
        for (let i = 1; i < bars.length; i++) {
          const prevC = adjC(bars[i - 1]), curC = adjC(bars[i]);
          if (!bars[i].date || !prevC || !curC || prevC <= 0) continue;
          const d = new Date(bars[i].date);
          if (!isNaN(d) && d.getMonth() === curMonth) {
            monthRets.push((curC - prevC) / prevC);
          }
        }
        if (monthRets.length > 10) {
          const avg = monthRets.reduce((a, b) => a + b, 0) / monthRets.length;
          const pct = (avg * 100).toFixed(2);
          if (avg > 0.001) points.push(`📅 Historically, <strong>${monthNames[curMonth]}</strong> has been a positive month (avg: +${pct}%).`);
          else if (avg < -0.001) points.push(`📅 Historically, <strong>${monthNames[curMonth]}</strong> tends to be weak (avg: ${pct}%).`);
        }
      }

      // Overall conclusion
      const total = bullScore + bearScore;
      const ratio = total > 0 ? bullScore / total : 0.5;
      let overallVerdict, verdictCls;
      if (ratio >= 0.65) { overallVerdict = 'The overall technical picture is <strong>BULLISH</strong>. Price is in an uptrend with favorable momentum indicators.'; verdictCls = 'bullish'; }
      else if (ratio <= 0.35) { overallVerdict = 'The overall technical picture is <strong>BEARISH</strong>. Price faces headwinds with negative momentum signals.'; verdictCls = 'bearish'; }
      else { overallVerdict = 'The technical picture is <strong>MIXED</strong>. Conflicting signals suggest a wait-and-see approach.'; verdictCls = 'neutral'; }

      return `<div class="section section-full">
      <h2>📝 Price Conclusion <span style="font-size:0.7rem;color:var(--text-muted);text-transform:none;letter-spacing:0">20-200d context</span></h2>
      <div class="verdict-box ${verdictCls}" style="font-size:0.95rem;padding:0.75rem;margin-bottom:0.75rem;">${overallVerdict}</div>
      <div style="display:flex;flex-direction:column;gap:0.4rem;">
        ${points.map(p => `<div style="font-size:0.82rem;color:var(--text);line-height:1.5;padding:0.3rem 0;border-bottom:1px solid rgba(255,255,255,0.03);">${p}</div>`).join('')}
      </div>
      <div style="font-size:0.7rem;color:var(--text-muted);margin-top:0.75rem;text-align:center;">⚠️ This is a technical summary, not financial advice. Always conduct your own research.</div>
    </div>`;
    }
  </script>

  <!-- Market Clock Script (shared with frontpage) -->
  <script src="/market-clock.js"></script>
  <script>
    (function () {
      const el = document.getElementById("rv-data-updated-date");
      if (el) el.textContent = new Date().toISOString().split("T")[0];
    })();
  </script>

<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="UTF-8" />
  <title>Stock Analysis · RubikVault</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <meta name="description"
    content="Comprehensive technical analysis dashboard for any stock — Moving Averages, RSI, MACD, Bollinger Bands, and more." />
  <!-- OG / Social Meta (updated dynamically on render) -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="RubikVault" />
  <meta property="og:image" content="https://rubikvault.com/assets/rv-favicon.png" />
  <meta property="og:title" id="og-title" content="Stock Analysis · RubikVault" />
  <meta property="og:description" id="og-desc" content="Technical analysis dashboard — Moving Averages, RSI, MACD, Bollinger Bands and more." />
  <meta property="og:url" id="og-url" content="https://rubikvault.com/analyze/" />
  <meta name="twitter:card" content="summary" />
  <link rel="icon" type="image/png" sizes="32x32" href="https://rubikvault.com/assets/rv-favicon.png" />
  <script>
    const RV_ASSET_BASE = window.location.protocol === 'file:' ? '.' : '';
    document.write(`<link rel="stylesheet" href="${RV_ASSET_BASE}/style.css" />`);
    document.write(`<link rel="stylesheet" href="${RV_ASSET_BASE}/search.css" />`);
  </script>
  <style>
    :root {
      --bg: #020617;
      --card: rgba(15, 23, 42, 0.92);
      --card-hover: rgba(15, 23, 42, 0.98);
      --border: rgba(148, 163, 184, 0.15);
      --border-bright: rgba(148, 163, 184, 0.3);
      --text: #f1f5f9;
      --text-dim: #94a3b8;
      --text-muted: #64748b;
      --accent: #06b6d4;
      --accent-glow: rgba(6, 182, 212, 0.12);
      --green: #10b981;
      --green-bg: rgba(16, 185, 129, 0.08);
      --red: #f87171;
      --red-bg: rgba(248, 113, 113, 0.08);
      --yellow: #fbbf24;
      --yellow-bg: rgba(251, 191, 36, 0.08);
      --radius: 16px;
      --radius-sm: 10px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .rv-main {
      max-width: 980px;
      margin: 0 auto;
      padding: 2rem 1.25rem 3rem;
    }

    /* ─── Header Card ─── */
    .header-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem 1.75rem;
      margin-bottom: 1rem;
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .header-left {
      display: flex;
      flex-direction: column;
      gap: 0.15rem;
    }

    .stock-title {
      font-size: 1.75rem;
      font-weight: 800;
      margin: 0;
      letter-spacing: -0.02em;
    }

    .stock-subtitle {
      font-size: 0.85rem;
      color: var(--text-dim);
    }

    .stock-form {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      flex-wrap: wrap;
    }

    .stock-form input {
      padding: 0.6rem 1rem;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(15, 23, 42, 0.6);
      color: var(--text);
      font-size: 0.95rem;
      width: 140px;
      outline: none;
    }

    .stock-form input:focus {
      border-color: var(--accent);
    }

    .stock-form button {
      padding: 0.6rem 1.25rem;
      border-radius: 999px;
      border: none;
      background: linear-gradient(135deg, #14b8a6, #06b6d4);
      color: #0f172a;
      font-weight: 700;
      cursor: pointer;
      font-size: 0.9rem;
    }

    .badges {
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
      margin-top: 0.5rem;
    }

    .badge {
      padding: 0.2rem 0.6rem;
      border-radius: 6px;
      font-size: 0.75rem;
      font-weight: 600;
      border: 1px solid var(--border);
      color: var(--text-dim);
      background: rgba(255, 255, 255, 0.03);
    }

    .badge.unknown {
      border-color: rgba(248, 113, 113, 0.4);
      color: var(--red);
    }

    /* ─── Price Block ─── */
    .price-block {
      display: flex;
      align-items: baseline;
      gap: 1rem;
      flex-wrap: wrap;
      margin-top: 0.75rem;
    }

    .price-big {
      font-size: 2.5rem;
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    .price-change {
      font-size: 1.1rem;
      font-weight: 700;
      padding: 0.25rem 0.6rem;
      border-radius: 8px;
    }

    .price-change.up {
      color: var(--green);
      background: var(--green-bg);
    }

    .price-change.down {
      color: var(--red);
      background: var(--red-bg);
    }

    .price-date {
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    /* ─── 52W Range ─── */
    .range-52w {
      margin-top: 0.75rem;
    }

    .range-bar {
      height: 6px;
      background: rgba(148, 163, 184, 0.15);
      border-radius: 3px;
      position: relative;
    }

    .range-dot {
      position: absolute;
      top: -3px;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--accent);
      border: 2px solid var(--bg);
      transform: translateX(-50%);
    }

    .range-labels {
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 0.2rem;
    }

    .range-labels .range-pct {
      font-size: 0.7rem;
      color: var(--text-dim);
    }

    /* ─── Error ─── */
    .error-box {
      padding: 0.75rem 1rem;
      border-radius: var(--radius-sm);
      background: var(--red-bg);
      border: 1px solid rgba(248, 113, 113, 0.4);
      color: var(--red);
      font-size: 0.85rem;
      margin-bottom: 1rem;
    }

    /* ─── Grid layout ─── */
    .sections-grid {
      display: grid;
      gap: 1rem;
      grid-template-columns: 1fr 1fr;
    }

    .section-full {
      grid-column: 1 / -1;
    }

    /* ─── Section Card ─── */
    .section {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.5rem;
      overflow: hidden;
    }

    .section h2 {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin: 0 0 0.75rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    /* ─── Metric Grid ─── */
    .m-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 0.5rem;
    }

    .m-item {
      padding: 0.6rem 0.75rem;
      border-radius: var(--radius-sm);
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.04);
    }

    .m-label {
      font-size: 0.7rem;
      color: var(--text-muted);
      margin-bottom: 0.15rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .m-val {
      font-size: 1rem;
      font-weight: 700;
    }

    .m-sub {
      font-size: 0.7rem;
      color: var(--text-dim);
      margin-top: 0.1rem;
    }

    /* ─── MA Table ─── */
    .ma-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }

    .ma-table th {
      text-align: left;
      font-size: 0.7rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      padding: 0.4rem 0.5rem;
      border-bottom: 1px solid var(--border);
      font-weight: 600;
    }

    .ma-table td {
      padding: 0.5rem 0.5rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.03);
    }

    .ma-table tr:last-child td {
      border-bottom: none;
    }

    .ma-pos {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      font-weight: 700;
      font-size: 0.8rem;
    }

    .ma-pos.above {
      color: var(--green);
    }

    .ma-pos.below {
      color: var(--red);
    }

    /* ─── Stack Badge ─── */
    .stack-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.4rem 0.8rem;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
    }

    .stack-badge.bullish {
      background: var(--green-bg);
      color: var(--green);
      border: 1px solid rgba(16, 185, 129, 0.3);
    }

    .stack-badge.bearish {
      background: var(--red-bg);
      color: var(--red);
      border: 1px solid rgba(248, 113, 113, 0.3);
    }

    .stack-badge.mixed {
      background: var(--yellow-bg);
      color: var(--yellow);
      border: 1px solid rgba(251, 191, 36, 0.3);
    }

    /* ─── Gauge ─── */
    .gauge {
      margin-bottom: 0.75rem;
    }

    .gauge:last-child {
      margin-bottom: 0;
    }

    .gauge-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 0.3rem;
    }

    .gauge-label {
      font-size: 0.8rem;
      font-weight: 600;
    }

    .gauge-value {
      font-size: 0.85rem;
      font-weight: 700;
    }

    .gauge-bar {
      height: 8px;
      background: rgba(148, 163, 184, 0.1);
      border-radius: 4px;
      position: relative;
      overflow: hidden;
    }

    .gauge-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.3s;
    }

    .gauge-zones {
      display: flex;
      gap: 0;
      height: 100%;
    }

    .gauge-zone {
      height: 100%;
    }

    .gauge-marker {
      position: absolute;
      top: -2px;
      width: 3px;
      height: 12px;
      background: white;
      border-radius: 1px;
      transform: translateX(-50%);
      box-shadow: 0 0 4px rgba(0, 0, 0, 0.5);
    }

    .gauge-ticks {
      display: flex;
      justify-content: space-between;
      font-size: 0.65rem;
      color: var(--text-muted);
      margin-top: 0.15rem;
    }

    /* ─── Signal chip ─── */
    .signal-chip {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.3rem 0.7rem;
      border-radius: 6px;
      font-size: 0.78rem;
      font-weight: 700;
    }

    .signal-chip.buy {
      background: var(--green-bg);
      color: var(--green);
    }

    .signal-chip.sell {
      background: var(--red-bg);
      color: var(--red);
    }

    .signal-chip.neutral {
      background: rgba(148, 163, 184, 0.08);
      color: var(--text-dim);
    }

    /* ─── Signal Table ─── */
    .sig-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }

    .sig-table th {
      text-align: left;
      font-size: 0.7rem;
      color: var(--text-muted);
      text-transform: uppercase;
      padding: 0.4rem 0.5rem;
      border-bottom: 1px solid var(--border);
      font-weight: 600;
    }

    .sig-table td {
      padding: 0.45rem 0.5rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.03);
    }

    .sig-table tr:last-child td {
      border-bottom: none;
    }

    /* ─── Perf bars ─── */
    .perf-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.35rem 0;
    }

    .perf-label {
      font-size: 0.8rem;
      color: var(--text-dim);
      width: 50px;
      text-align: right;
      flex-shrink: 0;
    }

    .perf-bar-container {
      flex: 1;
      height: 20px;
      position: relative;
      border-radius: 4px;
      overflow: hidden;
      background: rgba(148, 163, 184, 0.05);
    }

    .perf-bar {
      height: 100%;
      position: absolute;
      top: 0;
      border-radius: 4px;
      min-width: 2px;
    }

    .perf-bar.positive {
      background: linear-gradient(90deg, rgba(16, 185, 129, 0.4), rgba(16, 185, 129, 0.7));
      right: 50%;
    }

    .perf-bar.negative {
      background: linear-gradient(270deg, rgba(248, 113, 113, 0.4), rgba(248, 113, 113, 0.7));
      left: 50%;
    }

    .perf-center {
      position: absolute;
      left: 50%;
      top: 0;
      bottom: 0;
      width: 1px;
      background: rgba(148, 163, 184, 0.2);
    }

    .perf-val {
      font-size: 0.8rem;
      font-weight: 700;
      width: 65px;
      flex-shrink: 0;
    }

    .perf-val.positive {
      color: var(--green);
    }

    .perf-val.negative {
      color: var(--red);
    }

    /* ─── Levels ─── */
    .levels-list {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }

    .level-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.4rem 0.6rem;
      border-radius: 6px;
      border-left: 3px solid;
      font-size: 0.85rem;
      background: rgba(255, 255, 255, 0.02);
    }

    .level-item.support {
      border-left-color: var(--green);
    }

    .level-item.resistance {
      border-left-color: var(--red);
    }

    .level-item.current {
      border-left-color: var(--accent);
      background: var(--accent-glow);
    }

    .level-name {
      font-weight: 600;
      font-size: 0.8rem;
    }

    .level-price {
      font-weight: 700;
    }

    .level-dist {
      font-size: 0.75rem;
      color: var(--text-dim);
      margin-left: 0.5rem;
    }

    /* ─── S/R Level Ladder ─── */
    .sr-summary {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 0.75rem;
      margin-bottom: 0.5rem;
      align-items: start;
    }
    .sr-item { padding: 0.75rem; border-radius: var(--radius-sm); border: 1px solid var(--border); }
    .sr-item.support    { background: rgba(16,185,129,0.06); border-color: rgba(16,185,129,0.25); }
    .sr-item.resistance { background: rgba(248,113,113,0.06); border-color: rgba(248,113,113,0.25); }
    .sr-item.empty      { opacity: 0.5; }
    .sr-current { text-align: center; padding: 0.75rem 0.5rem; }
    .sr-label  { font-size: 0.65rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 0.25rem; }
    .sr-price  { font-size: 1.1rem; font-weight: 800; margin-bottom: 0.1rem; }
    .sr-item.support    .sr-price { color: var(--green); }
    .sr-item.resistance .sr-price { color: var(--red); }
    .sr-name  { font-size: 0.75rem; color: var(--text-dim); }
    .sr-dist  { font-size: 0.72rem; color: var(--text-muted); }
    .sr-trigger  { font-size: 0.7rem; color: var(--accent); margin-top: 0.2rem; }
    .sr-invalid  { font-size: 0.7rem; color: var(--red); margin-top: 0.2rem; }
    .key-level { font-weight: 700; }
    @media (max-width: 500px) { .sr-summary { grid-template-columns: 1fr; } }

    /* ─── Collapsible Advanced Sections ─── */
    details.advanced-collapsible {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 1rem 1.25rem;
    }
    details.advanced-collapsible[open] { padding-bottom: 1rem; }
    summary.section-summary-header {
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--text-dim);
      list-style: none;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      user-select: none;
    }
    summary.section-summary-header::before { content: '▶'; font-size: 0.6rem; transition: transform 0.2s; }
    details[open] > summary.section-summary-header::before { transform: rotate(90deg); }
    summary.section-summary-header::-webkit-details-marker { display: none; }
    .advanced-badge {
      font-size: 0.6rem; font-weight: 700; letter-spacing: 0.08em;
      background: rgba(148,163,184,0.12); color: var(--text-muted);
      padding: 0.1rem 0.35rem; border-radius: 4px; border: 1px solid var(--border);
    }

    /* ─── Decision Strip ─── */
    .decision-strip-section { grid-column: 1 / -1; }
    .decision-strip {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.75rem;
    }
    @media (max-width: 640px) { .decision-strip { grid-template-columns: 1fr; } }
    .decision-card {
      border-radius: var(--radius-sm);
      padding: 1rem;
      border: 1px solid var(--border);
    }
    .decision-card.bullish { background: var(--green-bg); border-color: rgba(16,185,129,0.35); }
    .decision-card.bearish { background: var(--red-bg);   border-color: rgba(248,113,113,0.35); }
    .decision-card.neutral { background: var(--yellow-bg); border-color: rgba(251,191,36,0.35); }
    .decision-horizon {
      font-size: 0.7rem; font-weight: 700; letter-spacing: 0.1em;
      color: var(--text-dim); text-transform: uppercase; margin-bottom: 0.35rem;
    }
    .decision-horizon-sub { font-weight: 400; letter-spacing: 0; }
    .decision-verdict {
      font-size: 1.25rem; font-weight: 800; letter-spacing: 0.04em; margin-bottom: 0.25rem;
    }
    .decision-card.bullish .decision-verdict { color: var(--green); }
    .decision-card.bearish .decision-verdict { color: var(--red); }
    .decision-card.neutral .decision-verdict { color: var(--yellow); }
    .decision-conf { font-size: 0.75rem; color: var(--text-dim); margin-bottom: 0.5rem; }
    .decision-reasons {
      margin: 0 0 0.5rem 0; padding: 0 0 0 1rem;
      font-size: 0.75rem; color: var(--text); line-height: 1.5;
    }
    .decision-reasons li { margin-bottom: 0.15rem; }
    .decision-trigger, .decision-invalid {
      font-size: 0.72rem; color: var(--text-dim); margin-top: 0.2rem;
      line-height: 1.4;
    }
    .decision-trigger { color: var(--accent); }

    /* ─── Verdict ─── */
    .verdict-box {
      text-align: center;
      padding: 1rem;
      border-radius: var(--radius-sm);
      margin-bottom: 0.75rem;
      font-size: 1.1rem;
      font-weight: 800;
      letter-spacing: 0.04em;
    }

    .verdict-box.bullish {
      background: var(--green-bg);
      color: var(--green);
      border: 1px solid rgba(16, 185, 129, 0.3);
    }

    .verdict-box.bearish {
      background: var(--red-bg);
      color: var(--red);
      border: 1px solid rgba(248, 113, 113, 0.3);
    }

    .verdict-box.neutral {
      background: var(--yellow-bg);
      color: var(--yellow);
      border: 1px solid rgba(251, 191, 36, 0.3);
    }

    .verdict-detail {
      font-size: 0.8rem;
      color: var(--text-dim);
      text-align: center;
    }

    /* ─── Score card ─── */
    .score-chips {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 0.5rem;
    }

    .score-chip {
      border-radius: 8px;
      padding: 0.3rem 0.7rem;
      border: 1px solid var(--border);
      font-size: 0.85rem;
      font-weight: 700;
    }

    .score-chip.positive {
      border-color: rgba(16, 185, 129, 0.5);
      background: var(--green-bg);
      color: var(--green);
    }

    .score-chip.negative {
      border-color: rgba(248, 113, 113, 0.5);
      background: var(--red-bg);
      color: var(--red);
    }

    .score-chip.n {
      border-color: var(--border);
      color: var(--text-dim);
    }

    .score-reasons {
      display: grid;
      gap: 0.5rem;
      margin-top: 0.5rem;
    }

    .score-reason-group {
      border-top: 1px solid var(--border);
      padding-top: 0.5rem;
    }

    .score-reason-group h3 {
      margin: 0 0 0.25rem;
      font-size: 0.8rem;
      color: var(--text-dim);
    }

    .score-reason {
      font-size: 0.8rem;
      color: var(--text);
    }

    /* ─── Loading ─── */
    .loading-state {
      text-align: center;
      padding: 3rem;
      color: var(--text-dim);
    }

    /* ─── Header OHLCV Strip ─── */
    .header-ohlcv-strip {
      display: flex;
      flex-wrap: wrap;
      gap: 0;
      margin-top: 0.75rem;
      border-top: 1px solid var(--border);
      padding-top: 0.65rem;
    }
    .header-ohlcv-item {
      flex: 1 1 auto;
      min-width: 70px;
      text-align: center;
      padding: 0.2rem 0.5rem;
      border-right: 1px solid rgba(148,163,184,0.08);
    }
    .header-ohlcv-item:last-child { border-right: none; }
    .header-ohlcv-lbl {
      display: block;
      font-size: 0.62rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .header-ohlcv-val {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text);
      margin-top: 1px;
    }
    .header-prov {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      align-items: center;
      margin-top: 0.5rem;
      padding-top: 0.45rem;
      border-top: 1px solid var(--border);

  </style>

  <main class="rv-main">

            style="display:none;position:absolute;top:100%;left:0;right:0;margin-top:4px;z-index:9999;max-height:300px;overflow-y:auto;background:var(--card, #0f172a);border:1px solid #334155;border-radius:8px;box-shadow:0 10px 25px rgba(0,0,0,0.8)">

  <script>
    document.write(`<script src="${RV_ASSET_BASE}/js/stock-features.js"><\/script>`);
  </script>
  <script>
    // ─── State ────────────────────────────────────────────────────────────────────
    const REMOTE_ORIGIN = 'https://rubikvault.com';
    const USE_REMOTE_ORIGIN = window.location.protocol === 'file:';
    const API_BASE = USE_REMOTE_ORIGIN ? REMOTE_ORIGIN : '';
    const form = document.getElementById('stock-form');
    const tickerInput = document.getElementById('stock-ticker');
    const errorBox = document.getElementById('stock-error');
    const app = document.getElementById('app');
    const params = new URLSearchParams(window.location.search);

    form.addEventListener('submit', e => { e.preventDefault(); const t = tickerInput.value.trim(); if (t) loadTicker(t); });

    // Extract ticker from URL: /analyze/:ticker (path) or ?ticker= (query param)
    const pathMatch = window.location.pathname.match(/\/analyze\/(.+)/);
    const initialTicker = (pathMatch ? decodeURIComponent(pathMatch[1]) : params.get('ticker') || '').trim();
    if (initialTicker) { tickerInput.value = initialTicker; loadTicker(initialTicker); }

    // ─── Ticker Autocomplete (re-uses /api/universe) ──────────────────────────────
    const acDropdown = document.getElementById('stock-ac-dropdown');
    let acTimer = null, acSuggestions = [], acIndex = -1, acOpen = false;
    function acPriority(item, query) {
      const ticker = String(item?.ticker || '').toUpperCase();
      const exchange = String(item?.exchange || '').toUpperCase();
      const name = String(item?.name || '').trim().toLowerCase();
      const qTicker = String(query || '').trim().toUpperCase();
      const qName = String(query || '').trim().toLowerCase();
      const rank = ticker === qTicker ? 0 : ticker.startsWith(qTicker) ? 1 : name.startsWith(qName) ? 2 : 3;
      const usRank = exchange === 'US' ? 0 : 1;
      return [rank, usRank, ticker.length || 99, ticker];
    }
    function acCompare(a, b, query) {
      const pa = acPriority(a, query), pb = acPriority(b, query);
      for (let i = 0; i < pa.length; i++) {
        if (pa[i] < pb[i]) return -1;
        if (pa[i] > pb[i]) return 1;
      }
      return 0;
    }
    function acDedupeKey(item) {
      // Dedup by ticker first — ensures AAPL only appears once regardless of exchange
      const ticker = String(item?.ticker || '').toUpperCase();
      if (ticker) return `ticker:${ticker}`;
      const name = String(item?.name || '').trim().toLowerCase();
      if (name && name.length >= 3) return `name:${name}`;
      return `raw:${ticker}`;
    }

    function renderAC() {
      if (!acSuggestions.length) { acDropdown.style.display = 'none'; acOpen = false; return; }
      acDropdown.innerHTML = '';
      acSuggestions.forEach((item, idx) => {
        const div = document.createElement('div');
        div.className = 'rv-dd-item' + (idx === acIndex ? ' rv-dd-item--highlighted' : '');
        div.style.padding = '8px 12px'; div.style.cursor = 'pointer'; div.style.borderBottom = '1px solid rgba(255,255,255,0.05)';
        div.innerHTML = `<strong>${item.name ? `${item.name} (${item.ticker}${item.exchange ? ` · ${item.exchange}` : ''})` : `${item.ticker}${item.exchange ? ` · ${item.exchange}` : ''}`}</strong>`;
        div.addEventListener('mousedown', (e) => { e.preventDefault(); selectAC(idx); });
        acDropdown.appendChild(div);
      });
      acDropdown.style.display = 'block'; acOpen = true;
    }

    function selectAC(idx) {
      if (!acSuggestions[idx]) return;
      tickerInput.value = acSuggestions[idx].ticker;
      acDropdown.style.display = 'none'; acOpen = false;
      loadTicker(acSuggestions[idx].ticker);
    }

    let acActiveController = null;
    tickerInput.addEventListener('input', () => {
      const q = tickerInput.value.trim();
      if (!q) { acSuggestions = []; renderAC(); return; }
      if (acActiveController) acActiveController.abort();

      clearTimeout(acTimer);
      acTimer = setTimeout(async () => {  // 0ms = instant from 1st character
        acActiveController = new AbortController();
        const { signal } = acActiveController;
        try {
          const res = await fetch(`${API_BASE}/api/universe?q=${encodeURIComponent(q)}&limit=8&t=${Date.now()}`, { signal });
          if (!res.ok) return;
          const data = await res.json();
          const deduped = new Map();
          (data?.data?.symbols || [])
            .map(s => ({
              ticker: s.symbol,
              name: s.name,
              exchange: s.exchange || (typeof s.canonical_id === 'string' && s.canonical_id.includes(':') ? s.canonical_id.split(':')[0] : null)
            }))
            .filter(s => s.ticker)
            .forEach((s) => {
              const key = acDedupeKey(s);
              const prev = deduped.get(key);
              if (!prev || acCompare(s, prev, q) < 0) {
                deduped.set(key, s);
              }
            });
          acSuggestions = Array.from(deduped.values()).sort((a, b) => acCompare(a, b, q)).slice(0, 8);
          acIndex = -1; renderAC();
        } catch (e) {
          if (e.name !== 'AbortError') console.error('AC fetch err', e);
        }
      }, 0);
    });

    tickerInput.addEventListener('keydown', e => {
      if (!acOpen || !acSuggestions.length) return;
      if (e.key === 'ArrowDown') { e.preventDefault(); acIndex = Math.min(acSuggestions.length - 1, acIndex + 1); renderAC(); }
      else if (e.key === 'ArrowUp') { e.preventDefault(); acIndex = Math.max(0, acIndex - 1); renderAC(); }
      else if (e.key === 'Enter') { e.preventDefault(); selectAC(Math.max(0, acIndex)); }
      else if (e.key === 'Escape') { acDropdown.style.display = 'none'; acOpen = false; }
    });

    tickerInput.addEventListener('focus', () => { if (tickerInput.value.trim() && acSuggestions.length) { acDropdown.style.display = 'block'; acOpen = true; } });
    tickerInput.addEventListener('blur', () => { setTimeout(() => { acDropdown.style.display = 'none'; acOpen = false; }, 200); });

    // ─── Trading Calendar Helper ──────────────────────────────────────────────────
    function getLastCompletedTradingDay() {
      const now = new Date();
      const nyParts = new Intl.DateTimeFormat('en-US', { timeZone: 'America/New_York', year: 'numeric', month: '2-digit', day: '2-digit', hour: 'numeric', minute: 'numeric', hour12: false, weekday: 'short' }).formatToParts(now);
      const nyH = parseInt(nyParts.find(p => p.type === 'hour')?.value || '0', 10);
      const nyM = parseInt(nyParts.find(p => p.type === 'minute')?.value || '0', 10);
      const nyWd = nyParts.find(p => p.type === 'weekday')?.value || '';
      const nyYear = nyParts.find(p => p.type === 'year')?.value;
      const nyMonth = nyParts.find(p => p.type === 'month')?.value;
      const nyDay = nyParts.find(p => p.type === 'day')?.value;
      const nyDate = new Date(`${nyYear}-${nyMonth}-${nyDay}T00:00:00`);
      const marketClosed = (nyH + nyM / 60) >= 16; // after 4pm ET
      const isWeekday = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri'].includes(nyWd);
      // If market is closed today (after 4pm on weekday), today is last trading day
      if (isWeekday && marketClosed) return `${nyYear}-${nyMonth}-${nyDay}`;
      // Otherwise go back to previous trading day
      let d = new Date(nyDate);
      d.setDate(d.getDate() - 1);
      // Skip weekends
      while (d.getDay() === 0 || d.getDay() === 6) d.setDate(d.getDate() - 1);
      return d.toISOString().slice(0, 10);
    }

    // ─── Formatters ───────────────────────────────────────────────────────────────
    const fmt = (v, d = 2) => v == null || !isFinite(v) ? '—' : v.toFixed(d);
    const fmtPct = v => v == null || !isFinite(v) ? '—' : `${(v * 100).toFixed(2)}%`;
    const fmtPctSigned = v => { if (v == null || !isFinite(v)) return '—'; const pv = (v * 100).toFixed(2); return v >= 0 ? `+${pv}%` : `${pv}%`; };
    const fmtCur = (v, c = 'USD') => v == null || !isFinite(v) ? '—' : new Intl.NumberFormat('en-US', { style: 'currency', currency: c }).format(v);
    const fmtVol = v => v == null || !isFinite(v) ? '—' : v >= 1e6 ? `${(v / 1e6).toFixed(1)}M` : v >= 1e3 ? `${(v / 1e3).toFixed(0)}K` : v.toFixed(0);
    const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));

    // ─── Load Ticker ──────────────────────────────────────────────────────────────
    async function loadTicker(ticker) {
      document.getElementById('stock-title').textContent = ticker.toUpperCase();
      document.getElementById('stock-subtitle').textContent = 'Loading analysis…';
      document.getElementById('price-block').style.display = 'none';
      document.getElementById('range-52w').style.display = 'none';
      document.getElementById('header-ohlcv').style.display = 'none';
      document.getElementById('header-provenance').style.display = 'none';
      errorBox.style.display = 'none';
      app.innerHTML = '<div class="loading-state">⏳ Fetching data…</div>';

      try {
        const v4Eval = (typeof isFeaturesV4Enabled === 'function' && isFeaturesV4Enabled()) ? '&eval_v4=1' : '';
        const res = await fetch(`${API_BASE}/api/stock?ticker=${encodeURIComponent(ticker)}${v4Eval}`);
        const payload = await res.json();
        render(payload);
      } catch (err) {
        console.error('[RV] loadTicker error:', err, err?.stack);
        errorBox.style.display = 'block';
        errorBox.textContent = `Data temporarily unavailable: ${err?.message || 'unknown error'}. Check console for details.`;
        app.innerHTML = '';
        document.getElementById('stock-subtitle').textContent = '';
      }
    }

    // ─── Main Render ──────────────────────────────────────────────────────────────
    function render(payload) {
      const { data, error, metadata } = payload;
      window._rvMetadata = metadata; // expose for features
      window._rvEnvelopeMeta = payload.meta || {}; // expose envelope meta for provenance bar
      window._rvPayload = payload;
      const ticker = metadata?.request?.normalized_ticker || data?.ticker || '—';
      const stats = data?.market_stats?.stats || {};
      const prices = data?.market_prices || {};
      const universe = data?.universe || {};
      const score = data?.market_score || {};
      const bars = data?.bars || [];
      const change = data?.change || {};
      const close = prices.close ?? bars[bars.length - 1]?.close ?? null;
      const asOf = metadata?.as_of || bars[bars.length - 1]?.date || null;
      const atr = Number.isFinite(stats.atr14) ? stats.atr14 : null;
      const atrPct = close > 0 && atr != null ? (atr / close) * 100 : null;
      window._rvCanonicalMetrics = {
        ticker,
        asOf,
        close: Number.isFinite(close) ? close : null,
        rsi14: Number.isFinite(stats.rsi14) ? stats.rsi14 : null,
        atr14: atr,
        atrPct,
        digest: metadata?.digest || null,
        schemaVersion: payload?.evaluation_v4?.schema_version || null,
        rawValidation: payload?.evaluation_v4?.v4_contract?.raw_validation?.value || null,
      };
      window._rvRenderCtx = { ticker, close, s: stats, bars, universe };

      // ── Header ──
      document.getElementById('stock-title').textContent = universe.name || ticker;
      const subtitleParts = [ticker];
      if (universe.exchange) subtitleParts.push(universe.exchange);
      if (universe.sector) subtitleParts.push(universe.sector);
      if (universe.industry && universe.industry !== universe.sector) subtitleParts.push(universe.industry);
      document.getElementById('stock-subtitle').textContent = universe.name ? subtitleParts.join(' · ') : (universe.sector ? `${ticker} · ${universe.sector}` : ticker);
      document.title = `${ticker} — Stock Analysis · RubikVault`;

      // ── OG meta dynamic update ──
      const ogTitle = document.getElementById('og-title');
      const ogDesc  = document.getElementById('og-desc');
      const ogUrl   = document.getElementById('og-url');
      if (ogTitle) ogTitle.setAttribute('content', `${ticker} — Stock Analysis · RubikVault`);
      if (ogDesc)  ogDesc.setAttribute('content',  `Technical analysis for ${universe.name || ticker}: Moving Averages, RSI, MACD, Bollinger Bands and more.`);
      if (ogUrl)   ogUrl.setAttribute('content',   `https://rubikvault.com/analyze/${encodeURIComponent(ticker)}`);

      // Badges
      const badgesEl = document.getElementById('stock-badges');
      badgesEl.innerHTML = '';
      const indexes = universe.indexes || [];
      if (indexes.length) {
        indexes.forEach(idx => { badgesEl.innerHTML += `<span class="badge">${idx}</span>`; });
      }
      const hasBars = bars.length > 0;
      const hasProfile = Boolean(universe.name || universe.sector);
      if (!hasBars && !hasProfile) {
        // Truly unknown ticker — no data at all
        badgesEl.innerHTML += '<span class="badge unknown">Ticker not found</span>';
      } else if (!universe.exists_in_universe) {
        if (hasProfile) {
          badgesEl.innerHTML += '<span class="badge" style="border-color:rgba(251,191,36,0.4);color:var(--yellow)">Coverage limited — not in premium universe</span>';
        } else if (hasBars) {
          // Has price data but no profile — analysis runs, just missing metadata
          badgesEl.innerHTML += '<span class="badge" style="border-color:rgba(148,163,184,0.3)">Company profile unavailable</span>';
        }
      } else if (!hasProfile) {
        badgesEl.innerHTML += '<span class="badge" style="border-color:rgba(148,163,184,0.3)">Company profile unavailable</span>';
      }

      // Price block
      if (close != null) {
        document.getElementById('price-block').style.display = 'flex';
        document.getElementById('price-big').textContent = fmtCur(close, prices.currency || 'USD');
        const chg = change.pct ?? stats.ret_1d_pct;
        const chgAbs = change.abs ?? stats.ret_1d_abs;
        const changeEl = document.getElementById('price-change');
        if (chg != null) {
          const sign = chg >= 0 ? '+' : '';
          changeEl.textContent = `${sign}${fmtCur(chgAbs, prices.currency || 'USD')} (${sign}${(chg * 100).toFixed(2)}%)`;
          changeEl.className = `price-change ${chg >= 0 ? 'up' : 'down'}`;
        } else { changeEl.textContent = ''; }
        document.getElementById('price-date').textContent = prices.date ? `As of ${prices.date}` : '';
      }

      // 52W Range
      const h52 = stats.high_52w, l52 = stats.low_52w;
      if (h52 != null && l52 != null && close != null && h52 > l52) {
        document.getElementById('range-52w').style.display = 'block';
        const pct = ((close - l52) / (h52 - l52)) * 100;
        document.getElementById('range-dot').style.left = `${clamp(pct, 2, 98)}%`;
        document.getElementById('range-low').textContent = fmtCur(l52);
        document.getElementById('range-high').textContent = fmtCur(h52);
        const fromHigh = ((close - h52) / h52 * 100).toFixed(1);
        const rangeLabel = pct > 95 ? 'At 52W high' : pct > 90 ? 'Near 52W high' : pct > 70 ? 'Upper range' : pct < 5 ? 'At 52W low' : pct < 10 ? 'Near 52W low' : pct < 30 ? 'Lower range' : 'Mid range';
        document.getElementById('range-pct').textContent = `${rangeLabel} · ${fromHigh}% from 52W high`;
      }

      // ── OHLCV + Provenance in header ──
      const headerOhlcv = document.getElementById('header-ohlcv');
      const headerProv = document.getElementById('header-provenance');
      if (headerOhlcv && bars.length) {
        headerOhlcv.innerHTML = buildOHLCVStrip(close, stats, bars);
        headerOhlcv.style.display = 'block';
      }
      if (headerProv && bars.length) {
        const md = window._rvMetadata || {};
        headerProv.innerHTML = buildDataProvenance(md, {}, bars);
        headerProv.style.display = 'block';
      }

      // ── Error ──
      if (error) {
        errorBox.style.display = 'block';
        errorBox.innerHTML = `<strong>${error.code}</strong>: ${error.message}`;
      }

      // ── Freshness badge (single source of truth for entire page) ──
      const envelopeStatus = (payload.meta?.status || 'unknown').toUpperCase();
      const dataDate = prices.date || bars[bars.length - 1]?.date || null;
      let effectiveFreshness = envelopeStatus;
      if (envelopeStatus === 'STALE' && dataDate) {
        const lastTradingDay = getLastCompletedTradingDay();
        if (dataDate >= lastTradingDay) effectiveFreshness = 'EOD_CURRENT';
      }
      window._rvEffectiveFreshness = effectiveFreshness; // shared across all panels
      const freshBadge = document.getElementById('rv-freshness-badge');
      if (freshBadge) {
        const statusLabel = effectiveFreshness === 'FRESH' ? 'LIVE' : effectiveFreshness === 'EOD_CURRENT' ? 'EOD current' : effectiveFreshness;
        const fbCol = (effectiveFreshness === 'FRESH' || effectiveFreshness === 'EOD_CURRENT') ? '#10b981' : effectiveFreshness === 'STALE' ? '#f59e0b' : '#ef4444';
        freshBadge.style.display = 'inline';
        freshBadge.style.color = fbCol;
        freshBadge.style.fontWeight = '600';
        freshBadge.textContent = statusLabel;
      }

      // ── Unknown ticker gate ──
      if (!bars.length && !universe.name && !universe.sector && close == null) {
        app.innerHTML = `<div style="text-align:center;padding:3rem 1rem">
          <div style="font-size:1.2rem;font-weight:700;color:var(--text);margin-bottom:.5rem">No data available for ${ticker}</div>
          <div style="font-size:.85rem;color:var(--text-dim)">This ticker was not found or has no price history. Try a different symbol.</div>
        </div>`;
        return;
      }

      // ── Sections ──
      app.innerHTML = buildSections(ticker, close, stats, score, bars, universe);
      window._rvRefreshTopSections = function () {
        const ctx = window._rvRenderCtx;
        if (!ctx) return;
        const decisionRoot = document.getElementById('rv-decision-strip-root');
        if (decisionRoot) decisionRoot.innerHTML = buildDecisionStrip(ctx.ticker, ctx.close, ctx.s, ctx.bars);
        const execRoot = document.getElementById('rv-executive-summary-root');
        if (execRoot) execRoot.innerHTML = buildExecutiveSummary(ctx.ticker, ctx.close, ctx.s, ctx.bars, ctx.universe);
        const verdictRoot = document.getElementById('rv-technical-verdict-root');
        if (verdictRoot) verdictRoot.innerHTML = buildVerdict(ctx.close, ctx.s);
        const canonicalRoot = document.getElementById('rv-canonical-truth-root');
        if (canonicalRoot) canonicalRoot.innerHTML = buildCanonicalTruthPanel(ctx.ticker, ctx.close, ctx.s, ctx.bars);
        const traceRoot = document.getElementById('rv-decision-trace-root');
        if (traceRoot) traceRoot.innerHTML = buildDecisionTracePanel(ctx.ticker);
      };
      const retryBtn = document.getElementById('rv-retry-btn');
      if (retryBtn) {
        retryBtn.onclick = async () => {
          retryBtn.disabled = true;
          retryBtn.textContent = 'Retrying…';
          try {
            await loadTicker(ticker);
          } finally {
            retryBtn.disabled = false;
            retryBtn.textContent = 'Retry / Refresh';
          }
        };
      }
      // Load async integrations (Scientific, Forecast, Elliott)
      loadAsyncInsights(ticker, { close, stats, bars, universe, evaluation_v4: payload?.evaluation_v4 || null });
      // Load real-time data modules (News from EODHD, Fundamentals)
      loadNewsAsync(ticker, stats);
      loadFundamentalsAsync(ticker);
    }

    // ─── News / Catalyst Module ───────────────────────────────────────────────────
    function buildNewsModule(ticker, close, s) {
      return `<div class="section section-full" id="rv-news-module" style="display:none">
        <h2>📰 News & Catalysts</h2>
        <div id="rv-news-content" style="font-size:.85rem;color:var(--text)"></div>
      </div>`;
    }

    async function loadNewsAsync(ticker, s) {
      const mod = document.getElementById('rv-news-module');
      const content = document.getElementById('rv-news-content');
      if (!mod || !content) return;
      try {
        const res = await fetch(`${API_BASE}/api/live/news?s=${encodeURIComponent(ticker)}`);
        if (!res.ok) return;
        const raw = await res.json();
        const articles = Array.isArray(raw) ? raw : (Array.isArray(raw?.data) ? raw.data : []);
        if (!articles.length) {
          // Fallback: show big-move alert if applicable
          const change1d = s?.ret_1d_pct;
          if (change1d != null && Math.abs(change1d) >= 0.03) {
            const dir = change1d > 0 ? 'up' : 'down';
            const col = dir === 'up' ? 'var(--green)' : 'var(--red)';
            const icon = dir === 'up' ? '▲' : '▼';
            const pct = (Math.abs(change1d) * 100).toFixed(1);
            content.innerHTML = `<strong style="color:${col}">${icon} ${pct}% move</strong> detected — no recent headlines found.`;
            mod.style.display = '';
          }
          return;
        }
        const top = articles.slice(0, 8);
        const html = top.map(a => {
          const title = a.title || 'Untitled';
          const date = a.date ? new Date(a.date).toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) : '';
          const link = a.link || '#';
          const sentiment = a.sentiment;
          let dot = '';
          if (sentiment) {
            const pol = typeof sentiment === 'object' ? sentiment.polarity : sentiment;
            if (pol != null && pol > 0.6) dot = '<span style="color:var(--green);margin-right:4px">●</span>';
            else if (pol != null && pol < 0.4) dot = '<span style="color:var(--red);margin-right:4px">●</span>';
            else dot = '<span style="color:var(--text-muted);margin-right:4px">●</span>';
          }
          return `<div style="padding:6px 0;border-bottom:1px solid var(--border)">
            ${dot}<a href="${link}" target="_blank" rel="noopener" style="color:var(--accent);text-decoration:none">${title}</a>
            <span style="color:var(--text-muted);font-size:.75rem;margin-left:6px">${date}</span>
          </div>`;
        }).join('');
        content.innerHTML = html;
        mod.style.display = '';
      } catch { /* silent */ }
    }

    // ─── Fundamentals Module ──────────────────────────────────────────────────────
    function buildFundamentalsModule(ticker, universe = {}) {
      // Static shell; real data loaded async
      const profileItems = [];
      if (universe.sector) profileItems.push({l: 'Sector', v: universe.sector});
      if (universe.industry) profileItems.push({l: 'Industry', v: universe.industry});
      if (universe.exchange) profileItems.push({l: 'Exchange', v: universe.exchange});
      if (universe.country) profileItems.push({l: 'Country', v: universe.country});
      const profileGrid = profileItems.length ? `<div class="m-grid" style="margin-bottom:.75rem">${profileItems.map(i => `<div class="m-item"><div class="m-label">${i.l}</div><div class="m-val" style="font-size:.88rem">${i.v}</div></div>`).join('')}</div>` : '';
      return `<div class="section section-full" id="rv-fundamentals-module">
        <h2>🏢 Fundamentals</h2>
        ${profileGrid}
        <div id="rv-fundamentals-content" style="font-size:.85rem;color:var(--text-dim)">Loading fundamentals…</div>
      </div>`;
    }

    function fundFmtLarge(n) {
      if (n == null) return '—';
      const abs = Math.abs(n);
      if (abs >= 1e12) return (n / 1e12).toFixed(2) + 'T';
      if (abs >= 1e9) return (n / 1e9).toFixed(2) + 'B';
      if (abs >= 1e6) return (n / 1e6).toFixed(1) + 'M';
      if (abs >= 1e3) return (n / 1e3).toFixed(1) + 'K';
      return n.toFixed(2);
    }

    function fundFmtPct(n) {
      if (n == null) return '—';
      return (n * 100).toFixed(2) + '%';
    }

    function fundFmtNum(n, d = 2) {
      if (n == null) return '—';
      return Number(n).toFixed(d);
    }

    async function loadFundamentalsAsync(ticker) {
      const content = document.getElementById('rv-fundamentals-content');
      if (!content) return;
      try {
        const res = await fetch(`${API_BASE}/api/fundamentals?ticker=${encodeURIComponent(ticker)}`);
        if (!res.ok) { content.innerHTML = `<div class="placeholder-card">No fundamentals are available for ${ticker} right now.</div>`; return; }
        const json = await res.json();
        const d = json?.data;
        if (!d || (!d.marketCap && !d.pe_ttm && !d.eps_ttm && !d.revenue_ttm)) {
          content.innerHTML = `<div class="placeholder-card">No fundamentals are available for ${ticker} right now.</div>`;
          return;
        }

        // Update profile fields from EODHD if richer than universe
        const mod = document.getElementById('rv-fundamentals-module');
        if (mod && (d.sector || d.industry || d.companyName)) {
          const h2 = mod.querySelector('h2');
          if (h2 && d.companyName) h2.textContent = `🏢 ${d.companyName}`;
        }

        const rows = [];
        const addRow = (label, val) => { if (val && val !== '—') rows.push({l: label, v: val}); };

        addRow('Market Cap', '$' + fundFmtLarge(d.marketCap));
        addRow('P/E (TTM)', fundFmtNum(d.pe_ttm));
        addRow('Forward P/E', fundFmtNum(d.forwardPE));
        addRow('PEG Ratio', fundFmtNum(d.pegRatio));
        addRow('P/S (TTM)', fundFmtNum(d.ps_ttm));
        addRow('P/B', fundFmtNum(d.pb));
        addRow('EV/EBITDA', fundFmtNum(d.ev_ebitda));
        addRow('EPS (TTM)', '$' + fundFmtNum(d.eps_ttm));
        addRow('Revenue (TTM)', '$' + fundFmtLarge(d.revenue_ttm));
        addRow('EBITDA', '$' + fundFmtLarge(d.ebitda));
        addRow('Gross Profit', '$' + fundFmtLarge(d.grossProfitTTM));
        addRow('Profit Margin', fundFmtPct(d.netMargin));
        addRow('Operating Margin', fundFmtPct(d.operatingMargin));
        addRow('ROE', fundFmtPct(d.returnOnEquity));
        addRow('ROA', fundFmtPct(d.returnOnAssets));
        addRow('Beta', fundFmtNum(d.beta));
        addRow('Dividend Yield', d.dividendYield != null ? fundFmtPct(d.dividendYield) : null);
        addRow('Shares Out', fundFmtLarge(d.sharesOutstanding));
        addRow('Shares Float', fundFmtLarge(d.sharesFloat));
        addRow('Book Value', '$' + fundFmtNum(d.bookValue));
        addRow('Wall St Target', d.wallStreetTarget != null ? '$' + fundFmtNum(d.wallStreetTarget) : null);
        addRow('Q Earnings Growth YOY', d.quarterlyEarningsGrowthYOY != null ? fundFmtPct(d.quarterlyEarningsGrowthYOY) : null);
        addRow('Q Revenue Growth YOY', d.quarterlyRevenueGrowthYOY != null ? fundFmtPct(d.quarterlyRevenueGrowthYOY) : null);

        if (!rows.length) { content.innerHTML = `<div class="placeholder-card">No fundamentals are available for ${ticker} right now.</div>`; return; }

        content.innerHTML = `<div class="m-grid">${rows.map(r => `<div class="m-item"><div class="m-label">${r.l}</div><div class="m-val">${r.v}</div></div>`).join('')}</div>`;
      } catch {
        content.innerHTML = `<div class="placeholder-card">No fundamentals are available for ${ticker} right now.</div>`;
      }
    }

    // ─── Build All Sections ───────────────────────────────────────────────────────
    function buildSections(ticker, close, s, score, bars, universe) {
      return `<div class="sections-grid">
    <div id="rv-decision-strip-root" style="grid-column:1/-1">${buildDecisionStrip(ticker, close, s, bars)}</div>
    ${buildNewsModule(ticker, close, s)}
    <div id="rv-executive-summary-root" style="grid-column:1/-1">${buildExecutiveSummary(ticker, close, s, bars, universe)}</div>
    ${buildLevels(close, s, bars)}
    ${typeof buildV4SlotShell === 'function' ? buildV4SlotShell() : ''}
    <div id="rv-technical-verdict-root" style="grid-column:1/-1">${buildVerdict(close, s)}</div>
    ${buildMASection(close, s)}
    ${buildOscillators(close, s)}
    ${buildVolatility(close, s)}
    ${buildVolume(s, bars)}
    ${buildFundamentalsModule(ticker, universe)}
    ${buildTrendMomentum(close, s, bars)}
    ${buildPerformance(s)}
    ${buildScore(score)}
    <details class="advanced-collapsible" id="rv-quantlab-details" open><summary class="section-summary-header">Quant Lab Experts <span class="advanced-badge">LOCAL RESULTS</span></summary><div id="rv-quantlab-slot"><div class="placeholder-card">Loading Quant Lab result mirror...</div></div></details>
    <details class="advanced-collapsible" id="rv-scientific-details" open><summary class="section-summary-header">🔬 Scientific Analyzer <span class="advanced-badge">ADVANCED</span></summary><div id="rv-scientific-slot"><div class="placeholder-card">Loading scientific analysis…</div></div></details>
    <details class="advanced-collapsible" id="rv-forecast-details" open><summary class="section-summary-header">🔮 ML Forecast <span class="advanced-badge">ADVANCED</span></summary><div id="rv-forecast-slot"><div class="placeholder-card">Loading forecast…</div></div></details>
    <details class="advanced-collapsible" id="rv-elliott-details" open><summary class="section-summary-header">🌊 Elliott Wave <span class="advanced-badge">ADVANCED</span></summary><div id="rv-elliott-slot"><div class="placeholder-card">Loading Elliott wave analysis…</div></div></details>
    <details class="advanced-collapsible"><summary class="section-summary-header">📊 Advanced Analytics <span class="advanced-badge">ADVANCED</span></summary>
      ${buildEarningsShockProxy(bars)}
      ${buildDrawdownAnatomy(bars)}
      ${buildVolTermStructure(bars)}
      ${buildMonteCarlo(bars)}
      ${buildLiquidityScore(s, bars)}
      ${buildSeasonality(bars)}
      ${buildCorrelations(ticker, bars)}
      ${buildFactorCorrelation(ticker, bars)}
      ${buildATRBands(close, s)}
      ${buildRiskBudget(close, s)}
      ${buildSignals(close, s)}
      ${buildStressScenarios(bars)}
      ${buildCorporateActions(bars)}
    </details>
    <details class="advanced-collapsible"><summary class="section-summary-header">🔍 Data Checks <span class="advanced-badge">ADVANCED</span></summary>
      <div id="rv-canonical-truth-root">${buildCanonicalTruthPanel(ticker, close, s, bars)}</div>
      ${buildDataHealthPanel(ticker)}
      <div id="rv-decision-trace-root">${buildDecisionTracePanel(ticker)}</div>
      ${buildBiotechContextPanel(ticker, universe)}
    </details>
    <div style="font-size:.68rem;color:var(--text-muted);text-align:center;padding:1rem 0;grid-column:1/-1">Technical analysis only. Not financial advice. Data sources: EODHD, Tiingo, Twelvedata.</div>
  </div>`;
    }

    // ─── Async Integration Loader ────────────────────────────────────────────────
    async function loadAsyncInsights(ticker, context = {}) {
      const slots = [
        { id: 'rv-quantlab-slot', fn: () => buildQuantLabInsight(ticker, context) },
        { id: 'rv-scientific-slot', fn: () => buildScientificInsight(ticker, context) },
        { id: 'rv-forecast-slot', fn: () => buildForecastInsight(ticker, context) },
        { id: 'rv-elliott-slot', fn: () => buildElliottInsight(ticker, context) },
      ];
      if (typeof isFeaturesV4Enabled === 'function' && isFeaturesV4Enabled()) {
        slots.push({ id: 'rv-v4-slot', fn: () => buildV4GovernanceInsight(ticker, context) });
      }
      const ASYNC_TIMEOUT = 12000;
      const FALLBACK_LABELS = {
        'rv-quantlab-slot': 'Quant Lab Experts',
        'rv-scientific-slot': '🔬 Scientific Analyzer',
        'rv-forecast-slot': '🔮 ML Forecast',
        'rv-elliott-slot': '🌊 Elliott Wave',
        'rv-v4-slot': '🧭 v4 Governance'
      };
      await Promise.allSettled(slots.map(async ({ id, fn }) => {
        const el = document.getElementById(id);
        if (!el) return;
        try {
          const result = await Promise.race([
            fn(),
            new Promise((_, reject) => setTimeout(() => reject(new Error('timeout')), ASYNC_TIMEOUT))
          ]);
          if (result && result.trim()) {
            el.innerHTML = result;
          } else {
            const label = FALLBACK_LABELS[id] || 'Section';
            const message = id === 'rv-quantlab-slot'
              ? `No fresh Quant Lab result is available for ${ticker} in today's local publish slice.`
              : `No live ${label.replace(/^[^\p{L}\p{N}]+/u, '')} block is available for ${ticker} right now.`;
            el.innerHTML = `<div class="section section-full"><h2>${label}</h2><div class="placeholder-card">${message}</div></div>`;
          }
        } catch (e) {
          if (e.message !== 'timeout') console.warn('Async insight error:', id, e);
          const label = FALLBACK_LABELS[id] || 'Section';
          const reason = id === 'rv-quantlab-slot'
            ? (e.message === 'timeout' ? 'Quant Lab result timed out.' : 'Quant Lab result is temporarily unavailable.')
            : (e.message === 'timeout' ? `${label} timed out.` : `${label} is temporarily unavailable.`);
          el.innerHTML = `<div class="section section-full"><h2>${label}</h2><div class="placeholder-card">${reason}</div></div>`;
        }
        const details = el.closest('details');
        if (details) details.setAttribute('open', '');
      }));
    }

    // Shared Bollinger signal — used by both Verdict and Signal Summary for consistency
    function getBollingerSignal(close, s) {
      if (s.bb_upper == null || s.bb_lower == null) return { sig: 'Neutral', pctB: null };
      const pctB = (close - s.bb_lower) / (s.bb_upper - s.bb_lower);
      const sig = pctB < 0.2 ? 'Buy' : pctB > 0.8 ? 'Sell' : 'Neutral';
      return { sig, pctB };
    }

    // 5-tier RSI classification — aligned with RSI_BUCKETS in stock-analyzer-contract.js
    function getRsiMeta(rsi) {
      if (!Number.isFinite(rsi)) return { zone: 'Unknown', signal: 'Neutral', color: 'var(--text-dim)' };
      if (rsi < 30) return { zone: 'Oversold',     signal: 'Buy',     color: 'var(--green)' };
      if (rsi < 45) return { zone: 'Soft Bearish', signal: 'Neutral', color: '#fb923c' };
      if (rsi < 55) return { zone: 'Neutral',      signal: 'Neutral', color: 'var(--text)' };
      if (rsi < 70) return { zone: 'Soft Bullish', signal: 'Neutral', color: 'var(--accent)' };
      return             { zone: 'Overbought',    signal: 'Sell',    color: 'var(--red)' };
    }

    function isBiotechTicker(universe = {}) {
      const hay = `${universe?.sector || ''} ${universe?.industry || ''} ${universe?.name || ''}`.toLowerCase();
      return /\bbiotech|biotechnology|pharma|therapeutics|drug\b/.test(hay);
    }

    function _fmtDigest(d) {
      const s = String(d || '').trim();
      return s ? `${s.slice(0, 12)}…` : '—';
    }

    function buildCanonicalTruthPanel(ticker, close, s, bars) {
      const can = window._rvCanonicalMetrics || {};
      const q = window._rvQualitySignals || {};
      const atrPct = can.atrPct != null ? `${can.atrPct.toFixed(2)}%` : '—';
      const mismatch = q.metricMismatch;
      return `<div class="section section-full">
        <h2>🧾 Canonical Truth & Provenance</h2>
        <div class="m-grid">
          <div class="m-item"><div class="m-label">Ticker</div><div class="m-val">${ticker}</div><div class="m-sub">Single source context</div></div>
          <div class="m-item"><div class="m-label">RSI14 (canonical)</div><div class="m-val">${can.rsi14 != null ? can.rsi14.toFixed(1) : '—'}</div><div class="m-sub">shared across modules</div></div>
          <div class="m-item"><div class="m-label">ATR14 (canonical)</div><div class="m-val">${can.atr14 != null ? fmtCur(can.atr14) : '—'}</div><div class="m-sub">${atrPct} of price</div></div>
          <div class="m-item"><div class="m-label">As-of</div><div class="m-val">${can.asOf || '—'}</div><div class="m-sub">bar timestamp</div></div>
          <div class="m-item"><div class="m-label">Digest</div><div class="m-val">${_fmtDigest(can.digest)}</div><div class="m-sub">payload hash</div></div>
          <div class="m-item"><div class="m-label">Schema</div><div class="m-val">${can.schemaVersion || 'rv.stock'}</div><div class="m-sub">contract version</div></div>
        </div>
        ${mismatch ? (() => {
          const mm = q.metricMismatchDetail || {};
          const rsiDrift = mm.rsiMismatch ? Math.abs((mm.canonicalRsi || 0) - (mm.sampleRsi || 0)) : 0;
          const atrDrift = mm.atrMismatch ? Math.abs((mm.canonicalAtrPct || 0) - (mm.sampleAtrPct || 0)) : 0;
          const severity = (rsiDrift > 10 || atrDrift > 3) ? 'critical' : (rsiDrift > 5 || atrDrift > 1.5) ? 'material' : 'minor';
          const sevCol = severity === 'critical' ? 'var(--red)' : severity === 'material' ? '#fb923c' : 'var(--yellow)';
          const sevBg = severity === 'critical' ? 'var(--red-bg)' : severity === 'material' ? 'rgba(251,146,60,.1)' : 'var(--yellow-bg)';
          const sevBorder = severity === 'critical' ? 'rgba(248,113,113,.4)' : severity === 'material' ? 'rgba(251,146,60,.35)' : 'rgba(251,191,36,.35)';
          return `<div style="margin-top:.55rem;padding:.45rem .6rem;border-radius:8px;background:${sevBg};border:1px solid ${sevBorder};font-size:.76rem;color:${sevCol}"><strong>Metric drift — ${severity.toUpperCase()}:</strong> canonical metrics diverge from model snapshot.${rsiDrift > 0 ? ` RSI delta: ${rsiDrift.toFixed(1)}pts.` : ''}${atrDrift > 0 ? ` ATR% delta: ${atrDrift.toFixed(1)}pts.` : ''} ${severity === 'critical' ? 'Decision reliability severely impacted.' : severity === 'material' ? 'Decision may be affected.' : 'Minor deviation — monitor.'}</div>`;
        })() : `<div style="margin-top:.55rem;font-size:.73rem;color:var(--text-muted)">Canonical metrics aligned — single decision reference for RSI/ATR/As-of.</div>`}
      </div>`;
    }

    function buildDataHealthPanel(ticker) {
      const meta = window._rvEnvelopeMeta || {};
      const cache = meta.cache || {};
      const raw = window._rvCanonicalMetrics?.rawValidation || null;
      // Use the same effective freshness as the header badge
      const effectiveState = window._rvEffectiveFreshness || (meta.status || 'unknown').toUpperCase();
      const stateCol = (effectiveState === 'FRESH' || effectiveState === 'EOD_CURRENT') ? 'var(--green)' : effectiveState === 'STALE' ? 'var(--yellow)' : 'var(--red)';
      const stateLabel = effectiveState === 'FRESH' ? 'LIVE' : effectiveState === 'EOD_CURRENT' ? 'EOD current' : effectiveState;
      return `<div class="section section-full">
        <h2>🩺 Data Health & Recovery</h2>
        <div class="m-grid">
          <div class="m-item"><div class="m-label">Freshness</div><div class="m-val" style="color:${stateCol}">${stateLabel}</div></div>
          <div class="m-item"><div class="m-label">Cache</div><div class="m-val">${cache.hit ? 'HIT' : 'MISS'}${cache.stale ? ' · stale' : ''}</div></div>
          <div class="m-item"><div class="m-label">Provider</div><div class="m-val">${meta.provider || '—'}</div></div>
          <div class="m-item"><div class="m-label">Raw Validation</div><div class="m-val" style="color:${raw == null ? 'var(--yellow)' : raw.valid ? 'var(--green)' : 'var(--red)'}">${raw == null ? 'UNKNOWN' : raw.valid ? 'VALID' : 'INVALID'}</div></div>
        </div>
        <div style="display:flex;align-items:center;justify-content:space-between;gap:.6rem;margin-top:.55rem">
          <div style="font-size:.72rem;color:var(--text-muted)">
            ${meta.degraded ? `Degraded: ${meta.degraded_reason || 'scheduler_stale'}` : ''}
          </div>
          <button id="rv-retry-btn" type="button" style="padding:.45rem .75rem;border-radius:8px;border:1px solid var(--border);background:rgba(255,255,255,.04);color:var(--text);font-weight:600;cursor:pointer">Retry</button>
        </div>
      </div>`;
    }

    function buildBiotechContextPanel(ticker, universe = {}) {
      if (!isBiotechTicker(universe)) return '';
      const q = window._rvQualitySignals || {};
      q.biotechContextMissing = true;
      window._rvQualitySignals = q;
      return `<div class="section section-full">
        <h2>🧬 Biotech Context Gate</h2>
        <div style="padding:.55rem .65rem;border-radius:8px;background:var(--yellow-bg);border:1px solid rgba(251,191,36,.35);font-size:.78rem;color:#fde68a">
          Biotech minimum context is incomplete for ${ticker}. Catalyst timeline, cash runway, dilution risk, and binary-event context are not connected in live feeds.
        </div>
        <div style="margin-top:.5rem;font-size:.74rem;color:var(--text-dim)">
          Decision confidence is capped at <strong>MEDIUM</strong> until biotech context coverage is available.
        </div>
      </div>`;
    }

    function buildDecisionTracePanel(ticker) {
      const q = window._rvQualitySignals || {};
      const can = window._rvCanonicalMetrics || {};
      const trace = window._rvPayload?.evaluation_v4?.v4_contract?.decision_trace?.value || null;
      // Audit-tauglich: gate name + cause + affected value + consequence
      const gateEntries = [];
      if (q.finalSuppressed) gateEntries.push({ gate: 'FINAL_SUPPRESSED', cause: 'rawValidation === INVALID', value: q.rawStatus || 'INVALID', consequence: 'All horizons suppressed, global action = SUPPRESSED' });
      if (q.rawStatus === 'UNKNOWN') gateEntries.push({ gate: 'RAW_VALIDATION_UNKNOWN', cause: 'rawValidation is null/missing', value: 'UNKNOWN', consequence: 'Global BUY blocked — data health unverified' });
      if (q.metricMismatch) gateEntries.push({ gate: 'CANONICAL_DRIFT', cause: 'RSI/ATR diverge from model snapshot', value: JSON.stringify(q.metricMismatchDetail || {}), consequence: 'Global BUY blocked — metric integrity uncertain' });
      if (q.rsiHardGate) gateEntries.push({ gate: 'RSI_HARD_GATE', cause: 'RSI14 >= 80', value: can.rsi14 != null ? can.rsi14.toFixed(1) : '>=80', consequence: 'Global BUY blocked — overbought hard gate' });
      if (q.biotechContextMissing) gateEntries.push({ gate: 'BIO_CONTEXT_MISSING', cause: 'Biotech minimum context incomplete', value: 'catalyst/runway/dilution unavailable', consequence: 'Global BUY blocked, confidence capped at MEDIUM' });
      if (q.rrBlockedHorizons > 0) gateEntries.push({ gate: `RR_BLOCKED_${q.rrBlockedHorizons}`, cause: 'R:R < 0.50 on horizon(s)', value: `${q.rrBlockedHorizons} horizon(s)`, consequence: 'Affected horizons downgraded to WAIT/AVOID' });
      if (q.forecastValidated === false) gateEntries.push({ gate: 'FORECAST_VALIDATION_INCOMPLETE', cause: 'Forecast not validated', value: '—', consequence: 'Forecast module output is advisory only' });
      if (q.forecastIndependent === false) gateEntries.push({ gate: 'FORECAST_NON_INDEPENDENT', cause: 'Forecast not independent', value: '—', consequence: 'Forecast module output is advisory only' });
      const chain = Array.isArray(trace?.reason_chain) ? trace.reason_chain : [];
      const gateRows = gateEntries.map(g => `<tr><td style="padding:.25rem .4rem;font-weight:600;color:var(--yellow);overflow-wrap:break-word">${g.gate}</td><td style="padding:.25rem .4rem;overflow-wrap:break-word">${g.cause}</td><td style="padding:.25rem .4rem;font-family:monospace;font-size:.7rem;overflow-wrap:break-word">${g.value}</td><td style="padding:.25rem .4rem;overflow-wrap:break-word">${g.consequence}</td></tr>`).join('');
      return `<div class="section section-full">
        <h2>📜 Decision Trace</h2>
        <div style="font-size:.78rem;color:var(--text-dim);line-height:1.55">
          Verdict: <strong style="color:var(--text)">${q.overallAction || q.decisionSummary || 'WAIT'}</strong> ·
          As-of: <strong style="color:var(--text)">${can.asOf || '—'}</strong> ·
          Digest: <strong style="color:var(--text)">${_fmtDigest(can.digest)}</strong>
        </div>
        ${gateEntries.length ? `<div style="overflow-x:auto;margin-top:.5rem"><table style="width:100%;table-layout:fixed;font-size:.72rem;border-collapse:collapse;word-break:break-word"><colgroup><col style="width:18%"><col style="width:28%"><col style="width:18%"><col style="width:36%"></colgroup><tr style="color:var(--text-muted);text-align:left"><th style="padding:.25rem .4rem">Gate</th><th style="padding:.25rem .4rem">Cause</th><th style="padding:.25rem .4rem">Value</th><th style="padding:.25rem .4rem">Consequence</th></tr>${gateRows}</table></div>` : `<div style="margin-top:.45rem;font-size:.74rem;color:var(--text-muted)">Gates: none</div>`}
        ${chain.length ? `<div style="margin-top:.35rem;font-size:.72rem;color:var(--text-muted)">Reason chain: ${chain.join(' → ')}</div>` : ''}
      </div>`;
    }

    // ─── 0. DECISION STRIP (above-the-fold, short/mid/long horizons) ─────────────
    function buildDecisionStrip(ticker, close, s, bars) {
      if (close == null) return '';
      const toNum = v => Number.isFinite(Number(v)) ? Number(v) : null;
      const fmtCurLocal = v => v == null ? '—' : '$' + Number(v).toFixed(2);
      const qPrev = window._rvQualitySignals || {};
      const rawState = window._rvCanonicalMetrics?.rawValidation;
      const rawStatus = rawState == null ? 'UNKNOWN' : rawState.valid ? 'VALID' : 'INVALID';
      const rawValid = rawStatus === 'VALID';
      const rawUnknown = rawStatus === 'UNKNOWN';
      const metricMismatch = Boolean(qPrev.metricMismatch);
      const biotechMissing = Boolean(qPrev.biotechContextMissing);
      const rsiHardGate = s.rsi14 != null && s.rsi14 >= 80;
      const anyGateActive = !rawValid || rawUnknown || metricMismatch || biotechMissing || rsiHardGate;
      const suppressed = rawStatus === 'INVALID';

      const swingHigh = (n) => {
        if (!Array.isArray(bars) || bars.length < 3) return null;
        const arr = bars.slice(-Math.max(3, n));
        const v = Math.max(...arr.map((b) => toNum(b.high) ?? toNum(b.close) ?? Number.NEGATIVE_INFINITY));
        return Number.isFinite(v) ? v : null;
      };
      const swingLow = (n) => {
        if (!Array.isArray(bars) || bars.length < 3) return null;
        const arr = bars.slice(-Math.max(3, n));
        const v = Math.min(...arr.map((b) => toNum(b.low) ?? toNum(b.close) ?? Number.POSITIVE_INFINITY));
        return Number.isFinite(v) ? v : null;
      };
      const pickLevel = (levels, side) => {
        const clean = [];
        for (const l of levels) {
          if (!l || !Number.isFinite(l.price)) continue;
          if (clean.some((x) => Math.abs(x.price - l.price) / close < 0.0025)) continue;
          clean.push(l);
        }
        const filtered = clean.filter((l) => side === 'above' ? l.price > close : l.price < close);
        if (!filtered.length) return null;
        filtered.sort((a, b) => side === 'above' ? a.price - b.price : b.price - a.price);
        return filtered[0];
      };

      function scoreHorizon(horizon) {
        let score = 0; const reasons = [];
        const rsiMeta = getRsiMeta(s.rsi14);
        if (horizon === 'short') {
          if (s.sma20 != null) { if (close > s.sma20) { score += 1; reasons.push('Price above SMA20'); } else { score -= 1; reasons.push('Price below SMA20'); } }
          if (s.macd_hist != null) { if (s.macd_hist > 0) { score += 1; reasons.push('MACD histogram positive'); } else { score -= 1; reasons.push('MACD histogram negative'); } }
          if (rsiMeta.zone === 'Oversold') { score += 0.5; reasons.push('RSI oversold bounce setup'); }
          if (rsiMeta.zone === 'Overbought') { score -= 0.75; reasons.push('RSI overbought'); }
        } else if (horizon === 'mid') {
          if (s.sma50 != null) { if (close > s.sma50) { score += 1; reasons.push('Price above SMA50'); } else { score -= 1; reasons.push('Price below SMA50'); } }
          if (s.sma20 != null && s.sma50 != null && s.sma200 != null) {
            if (s.sma20 > s.sma50 && s.sma50 > s.sma200) { score += 1.5; reasons.push('Bullish MA stack'); }
            else if (s.sma20 < s.sma50 && s.sma50 < s.sma200) { score -= 1.5; reasons.push('Bearish MA stack'); }
          }
          if (s.ret_20d_pct != null) { if (s.ret_20d_pct > 0) score += 0.5; else score -= 0.5; }
        } else {
          if (s.sma200 != null) { if (close > s.sma200) { score += 2; reasons.push('Price above SMA200'); } else { score -= 2; reasons.push('Price below SMA200'); } }
          if (s.range_52w_pct != null) {
            if (s.range_52w_pct > 0.9) { score += 1; reasons.push('Near 52W high'); }
            else if (s.range_52w_pct < 0.2) { score -= 1; reasons.push('Near 52W low'); }
          }
          if (s.volatility_percentile != null && s.volatility_percentile > 90) {
            score -= 0.5; reasons.push('Very high volatility');
          }
        }
        return { score, reasons: reasons.slice(0, 3) };
      }

      function baseVerdict(score) {
        if (score >= 2) return { label: 'BUY', cls: 'bullish', conf: score >= 3 ? 'HIGH' : 'MEDIUM', icon: '▲' };
        if (score <= -2) return { label: 'AVOID', cls: 'bearish', conf: score <= -3 ? 'HIGH' : 'MEDIUM', icon: '▼' };
        return { label: 'WAIT', cls: 'neutral', conf: Math.abs(score) >= 1 ? 'MEDIUM' : 'LOW', icon: '◆' };
      }

      const shortLevels = {
        trigger: pickLevel([
          { name: 'Swing High 10d', price: swingHigh(10) },
          { name: 'BB Upper', price: s.bb_upper },
          { name: 'SMA 20', price: s.sma20 },
        ], 'above'),
        invalid: pickLevel([
          { name: 'Swing Low 10d', price: swingLow(10) },
          { name: 'BB Lower', price: s.bb_lower },
          { name: 'SMA 20', price: s.sma20 },
        ], 'below')
      };
      const midLevels = {
        trigger: pickLevel([
          { name: 'Swing High 20d', price: swingHigh(20) },
          { name: 'SMA 20', price: s.sma20 },
          { name: '52W High', price: s.high_52w },
        ], 'above'),
        invalid: pickLevel([
          { name: 'SMA 50', price: s.sma50 },
          { name: 'Swing Low 20d', price: swingLow(20) },
          { name: 'SMA 200', price: s.sma200 },
        ], 'below')
      };
      const longLevels = {
        trigger: pickLevel([
          { name: '52W High', price: s.high_52w },
          { name: 'Swing High 60d', price: swingHigh(60) },
        ], 'above'),
        invalid: pickLevel([
          { name: 'SMA 200', price: s.sma200 },
          { name: 'Swing Low 60d', price: swingLow(60) },
          { name: '52W Low', price: s.low_52w },
        ], 'below')
      };

      const horizons = [
        { key: 'short', label: 'SHORT', sub: '1–5 days', levels: shortLevels },
        { key: 'mid', label: 'MID', sub: '1–12 weeks', levels: midLevels },
        { key: 'long', label: 'LONG', sub: '6–24 months', levels: longLevels },
      ];

      let rrBlockedHorizons = 0;
      const finalLabels = [];
      const cards = horizons.map((h) => {
        const sc = scoreHorizon(h.key);
        const base = baseVerdict(sc.score);
        let verdict = { ...base };
        const trigger = h.levels.trigger;
        const invalid = h.levels.invalid;
        let rr = null;
        let risk = null;
        let reward = null;
        const gateNotes = [];
        if (trigger && invalid) {
          risk = Math.abs(close - invalid.price);
          // Project reward beyond trigger using ATR-based targets per horizon
          const atr = s.atr14 || 0;
          const atrMult = h.key === 'short' ? 2.5 : h.key === 'mid' ? 5 : 8;
          const projectedTarget = trigger.price + atr * atrMult;
          reward = Math.abs(projectedTarget - close);
          rr = risk > 0 ? reward / risk : null;
          if (rr != null && rr < 0.5) {
            rrBlockedHorizons += 1;
            verdict = rr < 0.3 ? { label: 'AVOID', cls: 'bearish', conf: 'MEDIUM', icon: '▼' } : { label: 'WAIT', cls: 'neutral', conf: 'MEDIUM', icon: '◆' };
            gateNotes.push(`R:R gate blocked (${rr.toFixed(2)} < 0.50)`);
          } else if (rr != null && rr < 1.0) {
            gateNotes.push(`R:R caution (${rr.toFixed(2)} < 1.00)`);
          }
        } else {
          gateNotes.push('Missing trigger/invalidation level');
        }

        if (rsiHardGate && verdict.label === 'BUY') {
          verdict = { label: 'WAIT', cls: 'neutral', conf: 'LOW', icon: '◆' };
          gateNotes.push(`RSI hard gate (${s.rsi14.toFixed(1)} >= 80)`);
        }
        if (biotechMissing && verdict.conf === 'HIGH') verdict.conf = 'MEDIUM';
        if (metricMismatch && verdict.label === 'BUY') {
          verdict = { label: 'WAIT', cls: 'neutral', conf: 'LOW', icon: '◆' };
          gateNotes.push('Canonical metric drift blocks BUY');
        }
        if (rawUnknown && verdict.label === 'BUY') {
          verdict = { label: 'WAIT', cls: 'neutral', conf: 'LOW', icon: '◆' };
          gateNotes.push('Raw validation unknown — data health unverified');
        }
        if (suppressed) {
          verdict = { label: 'SUPPRESSED', cls: 'neutral', conf: 'LOW', icon: '⏸' };
          gateNotes.push('Raw data validation failed');
        }
        finalLabels.push(verdict.label);

        const rrColor = rr == null ? 'var(--text-muted)' : rr >= 2 ? 'var(--green)' : rr >= 0.5 ? 'var(--yellow)' : 'var(--red)';
        const rrText = rr == null ? '—' : `${rr.toFixed(2)}:1`;
        let triggerText = 'No trigger level';
        if (trigger) {
          const latestBar = bars.length ? bars[bars.length - 1] : null;
          const barHigh = latestBar ? (toNum(latestBar.high) ?? close) : close;
          const barClose = close;
          if (barClose >= trigger.price) {
            triggerText = `Confirmed breakout above ${trigger.name} (${fmtCurLocal(trigger.price)})`;
          } else if (barHigh >= trigger.price) {
            triggerText = `Rejected at ${trigger.name} (${fmtCurLocal(trigger.price)}) — failed breakout`;
          } else {
            triggerText = `Break above ${trigger.name} (${fmtCurLocal(trigger.price)})`;
          }
        }
        const invalidText = invalid ? `Loss of ${invalid.name} (${fmtCurLocal(invalid.price)})` : 'No invalidation level';

        return `<div class="decision-card ${verdict.cls}">
          <div class="decision-horizon">${h.label} <span class="decision-horizon-sub">${h.sub}</span></div>
          <div class="decision-verdict">${verdict.icon} ${verdict.label}</div>
          <div class="decision-conf">Confidence: <strong>${verdict.conf}</strong></div>
          <ul class="decision-reasons">${sc.reasons.map(r => `<li>${r}</li>`).join('')}</ul>
          <div class="decision-trigger">▶ Trigger: ${triggerText}</div>
          <div class="decision-invalid">✗ Structural Invalidation: ${invalidText}</div>
          <div style="font-size:.72rem;color:var(--text-dim);margin-top:.3rem" title="Risk = distance to invalidation. Reward = distance to projected target.">R:R <strong style="color:${rrColor}">${rrText}</strong>${rr != null ? (() => {
            const total = risk + reward;
            const riskPct = total > 0 ? Math.round(risk / total * 100) : 50;
            const rewardPct = 100 - riskPct;
            return ` <span style="display:inline-flex;align-items:center;gap:2px;vertical-align:middle"><span style="display:inline-block;width:${Math.max(8, riskPct * 0.6)}px;height:6px;background:var(--red);border-radius:2px 0 0 2px;opacity:.7"></span><span style="display:inline-block;width:${Math.max(8, rewardPct * 0.6)}px;height:6px;background:var(--green);border-radius:0 2px 2px 0;opacity:.7"></span></span> <span style="opacity:.7">risk ${fmtCurLocal(risk)} / reward ${fmtCurLocal(reward)}</span>`;
          })() : ''}</div>
          ${gateNotes.length ? `<div style="font-size:.7rem;color:var(--yellow);margin-top:.25rem">${gateNotes.join(' · ')}</div>` : ''}
        </div>`;
      }).join('');

      let overallAction = 'WAIT';
      if (suppressed) overallAction = 'SUPPRESSED';
      else if (finalLabels.every((l) => l === 'AVOID')) overallAction = 'AVOID';
      else if (finalLabels.some((l) => l === 'BUY') && rrBlockedHorizons === 0 && !anyGateActive) overallAction = 'BUY';
      const qNext = {
        ...qPrev,
        rrBlockedHorizons,
        horizonVerdicts: finalLabels,
        finalSuppressed: suppressed,
        anyGateActive,
        rsiHardGate,
        rawStatus,
        overallAction,
        decisionSummary: overallAction
      };
      window._rvQualitySignals = qNext;
      const quant = qNext.quantlab && qNext.quantlab.present ? qNext.quantlab : null;

      const trendWord = (s.sma20 > s.sma50 && s.sma50 > s.sma200) ? 'uptrend' : (s.sma20 < s.sma50 && s.sma50 < s.sma200) ? 'downtrend' : 'mixed trend';
      const rsiZone = getRsiMeta(s.rsi14).zone.toLowerCase();
      const gateSummary = [];
      if (rawStatus === 'INVALID') gateSummary.push('raw validation INVALID');
      if (rawUnknown) gateSummary.push('raw validation UNKNOWN — blocks BUY');
      if (metricMismatch) gateSummary.push('canonical metric drift — blocks BUY');
      if (rsiHardGate) gateSummary.push(`RSI hard gate (${s.rsi14.toFixed(1)} >= 80) — blocks BUY`);
      if (rrBlockedHorizons > 0) gateSummary.push(`${rrBlockedHorizons} horizon(s) blocked by R:R`);
      if (biotechMissing) gateSummary.push('biotech context missing — blocks BUY');

      // Inline next-action logic (merged from Action Playbook)
      const nearestTrigger = s.bb_upper || s.sma20;
      const nearestInvalid = s.bb_lower || s.sma50;
      let nextAction, nextActionColor;
      if (suppressed) {
        nextAction = 'No action — verdict suppressed until data integrity gates clear.';
        nextActionColor = 'var(--text-muted)';
      } else if (overallAction === 'BUY') {
        nextAction = `Entry allowed — confirm trigger breakout${nearestTrigger ? ' above ' + fmtCurLocal(nearestTrigger) : ''} and verify R:R.`;
        nextActionColor = 'var(--green)';
      } else if (overallAction === 'AVOID') {
        nextAction = `Avoid new entries.${nearestInvalid ? ' Invalidation near ' + fmtCurLocal(nearestInvalid) + '.' : ' Watch for trend reversal.'}`;
        nextActionColor = 'var(--red)';
      } else {
        const blocker = rsiHardGate ? 'RSI overextended — wait for pullback.'
          : rawUnknown ? 'Data health unverified.'
          : nearestTrigger ? 'Watch for confirmed close above ' + fmtCurLocal(nearestTrigger) + '.'
          : 'Monitor trigger and invalidation levels.';
        nextAction = `No new entry now. ${blocker}`;
        nextActionColor = 'var(--yellow)';
      }
      if (quant?.tone === 'good' && overallAction === 'WAIT') {
        nextAction = `${nextAction} Quant Lab already rates this ticker as a buy candidate, but the core entry gates are not clear yet.`;
      } else if (quant?.tone === 'bad' && overallAction === 'BUY') {
        nextAction = `${nextAction} Quant Lab is still more cautious than the technical stack.`;
      }
      const quantColor = quant?.tone === 'good' ? 'var(--green)' : quant?.tone === 'warn' ? 'var(--yellow)' : quant?.tone === 'bad' ? 'var(--red)' : 'var(--text)';
      const quantRank = quant?.globalTop10Rank
        ? `Global Quant Lab Top ${quant.globalTop10Rank}`
        : quant?.continentTop10Rank
          ? `Regional Quant Lab Top ${quant.continentTop10Rank}`
          : quant ? `${quant.strongExperts || 0} strong experts scored this ticker` : '';

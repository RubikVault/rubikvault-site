<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Runblock v3.0 Local Check</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #041126;
        --panel: #0a1a34;
        --panel-2: #0f2345;
        --text: #eef4ff;
        --muted: #9db0d2;
        --ok: #32d583;
        --warn: #f5b942;
        --bad: #ff6b6b;
        --line: rgba(157, 176, 210, 0.18);
        --accent: #5ac8fa;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top right, rgba(90, 200, 250, 0.16), transparent 28%),
          linear-gradient(180deg, #05101f 0%, var(--bg) 100%);
        color: var(--text);
      }

      main {
        width: min(1120px, calc(100% - 32px));
        margin: 32px auto 56px;
      }

      h1, h2 {
        margin: 0;
      }

      p {
        color: var(--muted);
      }

      .hero, .panel {
        background: linear-gradient(180deg, rgba(10, 26, 52, 0.98), rgba(9, 23, 44, 0.98));
        border: 1px solid var(--line);
        border-radius: 20px;
        padding: 20px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.22);
      }

      .hero {
        margin-bottom: 18px;
      }

      .status {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 8px 12px;
        border-radius: 999px;
        font-weight: 700;
        margin-top: 12px;
      }

      .status.pass { background: rgba(50, 213, 131, 0.14); color: var(--ok); }
      .status.fail { background: rgba(255, 107, 107, 0.14); color: var(--bad); }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 16px;
        margin-top: 18px;
      }

      .metric {
        background: var(--panel-2);
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 16px;
      }

      .metric strong {
        display: block;
        font-size: 26px;
        margin-top: 10px;
      }

      .label {
        color: var(--muted);
        font-size: 13px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      .stack {
        display: grid;
        gap: 16px;
        margin-top: 18px;
      }

      ul {
        margin: 12px 0 0;
        padding-left: 18px;
      }

      li {
        margin-bottom: 8px;
        color: var(--muted);
      }

      a {
        color: var(--accent);
      }

      code {
        background: rgba(255, 255, 255, 0.06);
        border-radius: 6px;
        padding: 2px 6px;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="hero">
        <h1>Runblock v3.0 Local Check</h1>
        <p id="summary">Lade lokalen Verifikationsstand...</p>
        <div id="status"></div>
      </section>
      <section class="grid" id="top-metrics"></section>
      <section class="stack" id="details"></section>
    </main>
    <script src="./data/runblock/v3/local-check.js"></script>
    <script>
      const data = window.__RUNBLOCK_V3_LOCAL_CHECK__;
      const summaryEl = document.getElementById('summary');
      const statusEl = document.getElementById('status');
      const metricsEl = document.getElementById('top-metrics');
      const detailsEl = document.getElementById('details');

      if (!data) {
        summaryEl.textContent = 'No local check found. Please run `npm run runblock:local-check`.';
      } else {
        summaryEl.textContent = `Generiert: ${data.generated_at}`;
        statusEl.innerHTML = `<div class="status ${data.status === 'PASS' ? 'pass' : 'fail'}">${data.status === 'PASS' ? 'PASS' : 'FAIL'}: Runblock lokal verifiziert</div>`;

        const metrics = [
          ['Runblock Tests', `${data.test_summary.pass ?? 0}/${(data.test_summary.pass ?? 0) + (data.test_summary.fail ?? 0)}`],
          ['Global State', data.pipeline.global_state || 'n/a'],
          ['Decision Logs', String(data.pipeline.decision_log_count ?? 0)],
          ['Snapshot', data.pipeline.snapshot_id ? 'persistiert' : 'fehlt'],
        ];

        metricsEl.innerHTML = metrics.map(([label, value]) => `
          <article class="metric">
            <span class="label">${label}</span>
            <strong>${value}</strong>
          </article>
        `).join('');

        const summaryList = Object.entries(data.summary || {}).map(([key, value]) => {
          const clean = key.replace(/_/g, ' ');
          return `<li><strong>${clean}</strong>: ${value ? 'ja' : 'nein'}</li>`;
        }).join('');

        const artifactList = Object.entries(data.artifacts || {}).map(([group, files]) => `
          <article class="panel">
            <h2>${group}</h2>
            <ul>
              ${files.map((item) => `<li>${item.present ? 'OK' : 'FEHLT'}: <code>${item.path}</code></li>`).join('')}
            </ul>
          </article>
        `).join('');

        detailsEl.innerHTML = `
          <article class="panel">
            <h2>Was jetzt wirklich aktiv ist</h2>
            <ul>${summaryList}</ul>
          </article>
          <article class="panel">
            <h2>Pipeline Ergebnis</h2>
            <ul>
              <li>Ticker: <strong>${data.pipeline.ticker}</strong></li>
              <li>Effektives Regime: <strong>${data.pipeline.effective_regime_tag}</strong></li>
              <li>Scientific State: <strong>${data.pipeline.scientific_state}</strong></li>
              <li>Forecast State: <strong>${data.pipeline.forecast_state}</strong></li>
              <li>Elliott State: <strong>${data.pipeline.elliott_state}</strong></li>
              <li>Snapshot Path: <code>${data.pipeline.snapshot_path || 'n/a'}</code></li>
            </ul>
          </article>
          <article class="panel">
            <h2>Lokale Links</h2>
            <ul>
              <li><a href="./data/runblock/v3/local-check.json">JSON Check</a></li>
              <li><a href="./data/runblock/v3/preflight-latest.json">Preflight</a></li>
              <li><a href="./data/runblock/v3/daily-regime-latest.json">Daily Regime</a></li>
              <li><a href="./data/runblock/v3/weekly-regime-latest.json">Weekly Regime</a></li>
              <li><a href="./data/runblock/v3/leakage-ci-latest.json">Leakage CI</a></li>
              <li><a href="./data/runblock/v3/shadow-canary-latest.json">Shadow / Canary</a></li>
              <li><a href="./data/runblock/v3/audit-replay-latest.json">Audit Replay</a></li>
            </ul>
          </article>
          ${artifactList}
        `;
      }
    </script>
  </body>
</html>

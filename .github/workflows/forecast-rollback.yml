name: Forecast Rollback

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for rollback (required)'
        required: true
        type: string
      target_commit:
        description: 'Target commit SHA to rollback to (optional, defaults to last_good)'
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: forecast-system
  cancel-in-progress: false

jobs:
  rollback:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Execute Rollback
        run: |
          echo "Rollback initiated by: ${{ github.actor }}"
          echo "Reason: ${{ inputs.reason }}"
          echo "Target: ${{ inputs.target_commit || 'last_good reference' }}"
          
          # Update status
          cat > public/data/forecast/system/status.json << EOF
          {
            "status": "ROLLBACK",
            "message": "Manual rollback: ${{ inputs.reason }}",
            "updated_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "rollback": {
              "initiated_by": "${{ github.actor }}",
              "reason": "${{ inputs.reason }}",
              "target": "${{ inputs.target_commit || 'last_good' }}"
            }
          }
          EOF
          
          # If target commit specified, checkout forecast data from that commit
          if [ -n "${{ inputs.target_commit }}" ]; then
            git checkout ${{ inputs.target_commit }} -- public/data/forecast/latest.json || echo "Could not restore latest.json"
          fi
          
      - name: Commit Rollback
        run: |
          set -euo pipefail
          git config --global user.name "rv-bot"
          git config --global user.email "bot@rubikvault.com"
          git add public/data/forecast
          if git diff --cached --quiet; then
            echo "No rollback changes"
            exit 0
          fi
          git commit -m "ops(forecast): rollback - ${{ inputs.reason }}"
          target_branch="${GITHUB_REF_NAME:-main}"
          for i in 1 2 3; do
            git fetch origin "$target_branch"
            if ! git rebase "origin/$target_branch"; then
              if [ -d .git/rebase-merge ] || [ -d .git/rebase-apply ]; then
                git rebase --abort
              fi
              echo "GREEN-SKIP: rebase conflict on ${target_branch}; publish deferred." >&2
              echo "GREEN-SKIP: rebase conflict on ${target_branch}; publish deferred." >> "$GITHUB_STEP_SUMMARY"
              exit 0
            fi
            if git push origin "HEAD:${target_branch}"; then
              exit 0
            fi
            echo "push failed (attempt $i); retrying in 5s" >&2
            sleep 5
          done
          echo "GREEN-SKIP: push failed after retries (likely concurrent writer); publish deferred." >&2
          echo "GREEN-SKIP: push failed after retries (likely concurrent writer); publish deferred." >> "$GITHUB_STEP_SUMMARY"
          exit 0
          
      - name: Create Issue
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🔄 Forecast System Rollback Executed',
              body: `## Rollback Details\n\n- **Initiated by:** ${{ github.actor }}\n- **Reason:** ${{ inputs.reason }}\n- **Target:** ${{ inputs.target_commit || 'last_good reference' }}\n- **Workflow Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`,
              labels: ['ops', 'forecast', 'rollback']
            })

name: Learning Report Daily

on:
  schedule:
    # Run daily at 00:30 UTC = 01:30 CET (after all upstream pipelines: EOD 22:10, Scientific 23:15, Forecast 23:30, Supermodules 23:45)
    - cron: '30 0 * * 2-6'
  workflow_dispatch:
    inputs:
      date:
        description: 'Override date (YYYY-MM-DD)'
        required: false
      replay_days:
        description: 'Backfill window in trading days (default: 14). Use 30 for one-time catchup.'
        required: false
        default: '14'

permissions:
  contents: write

concurrency:
  group: learning-report-daily
  cancel-in-progress: false

jobs:
  learning-cycle:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Incremental stock analyzer backfill
        env:
          NODE_OPTIONS: --max-old-space-size=6144
        run: |
          DATE_ARG=""
          if [ -n "${{ inputs.date }}" ]; then
            DATE_ARG="--date=${{ inputs.date }}"
          fi
          REPLAY_DAYS="${{ inputs.replay_days }}"
          REPLAY_DAYS="${REPLAY_DAYS:-14}"
          node scripts/learning/backfill-stock-analyzer-history.mjs $DATE_ARG --replay-days=${REPLAY_DAYS}

      - name: Run stock-analyzer publish chain
        run: |
          DATE_ARG=""
          if [ -n "${{ inputs.date }}" ]; then
            DATE_ARG="--date=${{ inputs.date }}"
          fi
          node scripts/ops/run-stock-analyzer-publish-chain.mjs $DATE_ARG

      - name: Generate PDF and send email
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          DATE_ARG=""
          if [ -n "${{ inputs.date }}" ]; then
            DATE_ARG="--date=${{ inputs.date }}"
          fi
          node scripts/learning/email-pdf-report.mjs $DATE_ARG

      - name: Commit learning report
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/reports/learning-report-latest.json public/data/reports/learning-report-latest.js public/data/runtime/stock-analyzer-control.json
          for optional_path in \
            public/data/snapshots/best-setups-v4.json \
            public/data/reports/best-setups-build-latest.json \
            public/data/reports/frontpage-snapshot-audit-latest.json \
            public/data/reports/analyzer-detail-audit-latest.json \
            public/data/reports/ui-audit-latest.json \
            public/data/reports/system-status-latest.json \
            public/dashboard_v6_meta_data.json \
            public/data/ops/publish-chain-latest.json \
            public/data/pipeline/runtime/latest.json \
            public/data/pipeline/epoch.json
          do
            if [ -f "$optional_path" ]; then
              git add "$optional_path"
            fi
          done
          if git diff --cached --quiet; then
            echo "No learning data changes to commit"
          else
            git commit -m "chore(learning): daily learning report $(date +%Y-%m-%d)"
            target_branch="${GITHUB_REF_NAME:-main}"
            for i in 1 2 3; do
              git fetch origin "$target_branch"
              if ! git rebase "origin/$target_branch"; then
                if [ -d .git/rebase-merge ] || [ -d .git/rebase-apply ]; then
                  git rebase --abort
                fi
                echo "GREEN-SKIP: rebase conflict on ${target_branch}; publish deferred." >&2
                echo "GREEN-SKIP: rebase conflict on ${target_branch}; publish deferred." >> "$GITHUB_STEP_SUMMARY"
                exit 0
              fi
              if git push origin "HEAD:${target_branch}"; then
                exit 0
              fi
              echo "push failed (attempt $i); retrying in 5s" >&2
              sleep 5
            done
            echo "GREEN-SKIP: push failed after retries (likely concurrent writer); publish deferred." >&2
            echo "GREEN-SKIP: push failed after retries (likely concurrent writer); publish deferred." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

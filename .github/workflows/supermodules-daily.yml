name: Super-Modules Build (Daily)

on:
  workflow_dispatch:
  # Primary trigger: runs after data-pulse completes (data-state dependency)
  workflow_run:
    workflows: ["data-pulse-daily.v3"]
    types: [completed]
    branches: [main]

permissions:
  contents: write

jobs:
  build-supermodules:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Risk & Resilience — uses existing v3/series data, no API key needed
      - name: Build Risk & Resilience
        run: node scripts/build-supermodules.mjs --module risk_resilience

      # Macro OS — uses existing macro-hub snapshot, no API key needed
      - name: Build Macro OS
        run: node scripts/build-supermodules.mjs --module macro_os

      # Fundamental Truth — needs EODHD API key for fundamentals
      - name: Build Fundamental Truth
        env:
          EODHD_API_KEY: ${{ secrets.EODHD_API_KEY }}
        run: node scripts/build-supermodules.mjs --module fundamental_truth --limit 200

      - name: Commit Super-Module artifacts
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/supermodules/
          if git diff --cached --quiet; then
            echo "No super-module changes to commit"
          else
            git commit -m "chore(supermodules): daily build $(date +%Y-%m-%d)"
            target_branch="${GITHUB_REF_NAME:-main}"
            for i in 1 2 3; do
              git fetch origin "$target_branch"
              if ! git rebase "origin/$target_branch"; then
                if [ -d .git/rebase-merge ] || [ -d .git/rebase-apply ]; then
                  git rebase --abort
                fi
                echo "GREEN-SKIP: rebase conflict on ${target_branch}; publish deferred." >&2
                echo "GREEN-SKIP: rebase conflict on ${target_branch}; publish deferred." >> "$GITHUB_STEP_SUMMARY"
                exit 0
              fi
              if git push origin "HEAD:${target_branch}"; then
                exit 0
              fi
              echo "push failed (attempt $i); retrying in 5s" >&2
              sleep 5
            done
            echo "GREEN-SKIP: push failed after retries (likely concurrent writer); publish deferred." >&2
            echo "GREEN-SKIP: push failed after retries (likely concurrent writer); publish deferred." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

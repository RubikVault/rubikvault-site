name: Fundamentals Waterfall Build (Daily)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-fundamentals:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build Fundamentals (Waterfall — EODHD→FMP→Finnhub→AV)
        env:
          EODHD_API_KEY: ${{ secrets.EODHD_API_KEY }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          ALPHAVANTAGE_API_KEY: ${{ secrets.ALPHAVANTAGE_API_KEY }}
        run: node scripts/build-fundamentals.mjs

      - name: Commit Fundamentals artifacts
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/fundamentals/
          if git diff --cached --quiet; then
            echo "No fundamentals changes to commit"
          else
            git commit -m "chore(data): fundamentals waterfall refresh [skip ci]"
            git push
          fi

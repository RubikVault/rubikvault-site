name: Ops Daily Snapshot

on:
  schedule:
    - cron: "5 7 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ops-daily-${{ github.ref_name }}-${{ github.event_name }}
  cancel-in-progress: false

jobs:
  dry-run:
    name: Ops Daily Dry-Run (no secrets)
    if: ${{ vars.RV_CI_MODE == 'dry' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install deps
        run: npm ci
      - name: Contracts (dry-run)
        run: npm run test:contracts

  run:
    if: ${{ vars.RV_CI_MODE != 'dry' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        run: npm ci

      - name: Preflight (blocking checks)
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN || secrets.CF_API_KEY }}
          CF_API_KEY: ${{ secrets.CF_API_KEY }}
        run: node scripts/ops/preflight-check.mjs --mode ops-daily

      - name: Build MarketPhase from KV (Full Universe)
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN || secrets.CF_API_KEY }}
          CF_API_KEY: ${{ secrets.CF_API_KEY }}
          EODHD_API_KEY: ${{ secrets.EODHD_API_KEY }}
          TIINGO_API_KEY: ${{ secrets.TIINGO_API_KEY }}
          MARKETPHASE_PROVIDER_FALLBACK: "1"
          MARKETPHASE_KV_GET_RETRIES: "10"
          MARKETPHASE_KV_BACKOFF_MS: "500"
        run: node scripts/pipeline/build-marketphase-from-kv.mjs --universe all --min-coverage 0.90

      - name: Build pipeline truth (NASDAQ-100)
        run: node scripts/pipeline/build-ndx100-pipeline-truth.mjs

      - name: Build pipeline runtime
        run: npm run ops:pipeline-runtime

      - name: Build pipeline epoch
        run: npm run ops:pipeline-epoch

      - name: Build pipeline compute audit
        run: npm run ops:pipeline-compute-audit

      - name: Build pipeline monitoring
        run: npm run ops:pipeline-monitoring

      - name: Verify retention policy
        run: npm run ops:retention-verify

      - name: Build stock-analyzer probability calibration
        run: npm run forecast:build-probability-calibration

      - name: Build safety snapshot
        run: node scripts/ops/build-safety-snapshot.mjs

      - name: Build ops-daily snapshot
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN || secrets.CF_API_KEY }}
          CF_API_KEY: ${{ secrets.CF_API_KEY }}
        run: node scripts/ops/build-ops-daily.mjs

      - name: Build ops summary
        run: node scripts/ops/build-mission-control-summary.mjs

      - name: Build ops pulse
        run: node scripts/ops/build-ops-pulse.mjs

      - name: Validate ops summary
        run: node scripts/ops/validate-ops-summary.mjs

      - name: Mission-control gate (softfail config-blocked)
        id: mc-gate
        run: |
          set -euo pipefail
          gate_log="${RUNNER_TEMP}/ops-mc-gate.log"
          set +e
          MC_GATE_STRICT=1 node scripts/ci/assert-mission-control-gate.mjs 2>&1 | tee "$gate_log"
          gate_exit=$?
          set -e
          if [ "$gate_exit" -ne 0 ]; then
            if grep -Eq 'NO_API_KEY' "$gate_log"; then
              echo "skip_publish=true" >> "$GITHUB_OUTPUT"
              echo "GREEN-SKIP: Mission-control blocked on NO_API_KEY; publish skipped, last_good preserved." >> "$GITHUB_STEP_SUMMARY"
              exit 0
            fi
            exit "$gate_exit"
          fi
          echo "skip_publish=false" >> "$GITHUB_OUTPUT"

      - name: Validate frontpage signal links
        if: steps.mc-gate.outputs.skip_publish != 'true'
        run: npm run test:frontpage-links

      - name: Validate control-plane cutover
        if: steps.mc-gate.outputs.skip_publish != 'true'
        run: npm run test:control-plane-cutover

      - name: Validate retention policy
        if: steps.mc-gate.outputs.skip_publish != 'true'
        run: npm run test:retention-policy

      - name: Commit + push (if changed)
        if: steps.mc-gate.outputs.skip_publish != 'true'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/ops-daily.json
          git ls-files -z \
            public/data/marketphase \
            public/data/reports \
            public/data/pipeline \
            | xargs -0 -r git add --
          if git diff --cached --quiet; then
            echo "No staged changes"
            exit 0
          fi
          git commit -m "chore(ops): update ops-daily snapshot"

          target_branch="${GITHUB_REF_NAME:-main}"
          for i in 1 2 3; do
            git fetch origin "$target_branch"
            if ! git rebase "origin/$target_branch"; then
              if [ -d .git/rebase-merge ] || [ -d .git/rebase-apply ]; then
                git rebase --abort
              fi
              echo "GREEN-SKIP: rebase conflict on ${target_branch}; publish deferred." >&2
              echo "GREEN-SKIP: rebase conflict on ${target_branch}; publish deferred." >> "$GITHUB_STEP_SUMMARY"
              exit 0
            fi
            if git push origin "HEAD:${target_branch}"; then
              exit 0
            fi
            echo "push failed (attempt $i); retrying in 5s" >&2
            sleep 5
          done
          echo "GREEN-SKIP: push failed after retries (likely concurrent writer); publish deferred." >&2
          echo "GREEN-SKIP: push failed after retries (likely concurrent writer); publish deferred." >> "$GITHUB_STEP_SUMMARY"
          exit 0

name: Universe v7 Daily
on:
  schedule:
    - cron: '0 6 * * *'  # 06:00 UTC daily
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: universe-v7
  cancel-in-progress: false

jobs:
  v7-run:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Orphan Guard
        run: node scripts/universe-v7/gates/orphan-guard.mjs

      - name: Registry Mirror Audit (report-only)
        run: node scripts/audit/registry-mirror-check.mjs

      - name: Mirror Envelope Validator (report-only)
        run: node scripts/validators/mirror-envelope-validator.mjs

      - name: Run v7 Daily Stack
        continue-on-error: true
        env:
          EODHD_API_KEY: ${{ secrets.EODHD_API_KEY }}
          RV_V7_DAILY_CAP_CALLS: '95000'
          RV_V7_BACKFILL_FROM_DATE: '1990-01-01'
        # Priority order for the next days:
        # 1) stocks (max history fill to >=200 bars where possible)
        # 2) etfs
        # 3) rest (forex/bonds/etc.)
        # Conservative pacing reduces false stops / retry waste.
        run: node scripts/universe-v7/run-daily-stack.mjs --buckets stocks,etfs,rest --max-runs-per-bucket 50 --max-no-progress-runs 3 --backfill-max 2000 --sleep-ms 2000 --min-bars 200 --feature marketphase --allow-next-bucket-on-incomplete

      - name: Run stock-analyzer publish chain
        env:
          NODE_OPTIONS: --max-old-space-size=6144
        run: node scripts/ops/run-stock-analyzer-publish-chain.mjs

      - name: Upload Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v7-reports-${{ github.run_number }}
          path: public/data/universe/v7/reports/
          retention-days: 30

      - name: Upload Marketphase Summary
        uses: actions/upload-artifact@v4
        with:
          name: marketphase-deep-summary
          path: public/data/universe/v7/read_models/marketphase_deep_summary.json
          retention-days: 1

      - name: Commit Results
        if: always()
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/universe/v7/
          git add public/data/forecast/
          for required_path in \
            public/data/quantlab/status/operational-status.json \
            public/data/quantlab/reports/v4-daily-latest.json \
            public/data/snapshots/best-setups-v4.json \
            public/data/reports/best-setups-build-latest.json \
            public/data/reports/frontpage-snapshot-audit-latest.json \
            public/data/reports/analyzer-detail-audit-latest.json \
            public/data/reports/ui-audit-latest.json \
            public/data/reports/system-status-latest.json \
            public/dashboard_v6_meta_data.json \
            public/data/ops/publish-chain-latest.json \
            public/data/pipeline/runtime/latest.json \
            public/data/pipeline/epoch.json
          do
            if [ -f "$required_path" ]; then
              git add "$required_path"
            fi
          done
          for optional_path in \
            public/data/reports/best-setups-etf-diagnostic-latest.json \
            mirrors/learning/reports/best-setups-etf-diagnostic-latest.json \
            public/data/runtime/stock-analyzer-control.json
          do
            if [ -f "$optional_path" ]; then
              git add "$optional_path"
            else
              echo "Optional artifact missing, skipping add: $optional_path"
            fi
          done
          if git diff --cached --quiet; then
            echo "No v7 changes to commit"
            exit 0
          fi
          git commit -m "chore(v7): daily update [skip ci]"
          target_branch="${GITHUB_REF_NAME:-main}"
          for i in 1 2 3; do
            git fetch origin "$target_branch"
            if ! git rebase "origin/$target_branch"; then
              if [ -d .git/rebase-merge ] || [ -d .git/rebase-apply ]; then
                git rebase --abort
              fi
              echo "GREEN-SKIP: rebase conflict on ${target_branch}; publish deferred." >&2
              echo "GREEN-SKIP: rebase conflict on ${target_branch}; publish deferred." >> "$GITHUB_STEP_SUMMARY"
              exit 0
            fi
            if git push origin "HEAD:${target_branch}"; then
              exit 0
            fi
            echo "push failed (attempt $i); retrying in 5s" >&2
            sleep 5
          done
          echo "GREEN-SKIP: push failed after retries (likely concurrent writer); publish deferred." >&2
          echo "GREEN-SKIP: push failed after retries (likely concurrent writer); publish deferred." >> "$GITHUB_STEP_SUMMARY"
          exit 0

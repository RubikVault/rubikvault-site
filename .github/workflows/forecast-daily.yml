name: 'Forecast Daily Pipeline'

on:
  workflow_dispatch:
    inputs:
      date:
        description: 'Trading date (YYYY-MM-DD), empty for auto'
        required: false
        type: string
  # Primary trigger: runs after data-pulse completes (data-state dependency)
  workflow_run:
    workflows: ["data-pulse-daily.v3"]
    types: [completed]
    branches: [main]

permissions:
  contents: write

concurrency:
  group: forecast-daily-${{ github.ref_name }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

env:
  NODE_VERSION: '20'
  # MEM v1.2 Determinism: Lock threads for reproducible runs
  OMP_NUM_THREADS: '1'
  MKL_NUM_THREADS: '1'
  OPENBLAS_NUM_THREADS: '1'

jobs:
  forecast-daily:
    name: 'Daily Forecast Run'
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Run daily pipeline
        id: pipeline
        run: |
          DATE_ARG=""
          if [ -n "${{ inputs.date }}" ]; then
            DATE_ARG="--date=${{ inputs.date }}"
          fi
          
          node scripts/forecast/run_daily.mjs $DATE_ARG 2>&1 | tee pipeline.log
          
          # Extract result for summary
          if grep -q "PIPELINE COMPLETE" pipeline.log; then
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "status=failed" >> $GITHUB_OUTPUT
          fi
        env:
          TZ: America/New_York

      - name: Commit forecast artifacts
        if: steps.pipeline.outputs.status == 'success'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Add ledger and report files
          git add mirrors/forecast/ledger/ || true
          git add mirrors/forecast/snapshots/ || true
          git add public/data/forecast/ || true
          
          # Check if there are changes
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore(forecast): daily pipeline $(date +%Y-%m-%d)"
            target_branch="${GITHUB_REF_NAME:-main}"
            for i in 1 2 3; do
              git fetch origin "$target_branch"
              if ! git rebase "origin/$target_branch"; then
                if [ -d .git/rebase-merge ] || [ -d .git/rebase-apply ]; then
                  git rebase --abort
                fi
                echo "GREEN-SKIP: rebase conflict on ${target_branch}; publish deferred." >&2
                echo "GREEN-SKIP: rebase conflict on ${target_branch}; publish deferred." >> "$GITHUB_STEP_SUMMARY"
                exit 0
              fi
              if git push origin "HEAD:${target_branch}"; then
                exit 0
              fi
              echo "push failed (attempt $i); retrying in 5s" >&2
              sleep 5
            done
            echo "GREEN-SKIP: push failed after retries (likely concurrent writer); publish deferred." >&2
            echo "GREEN-SKIP: push failed after retries (likely concurrent writer); publish deferred." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

      - name: Upload pipeline log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: forecast-daily-log
          path: pipeline.log
          retention-days: 30

      - name: Summary
        if: always()
        run: |
          echo "## Forecast Daily Pipeline" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.pipeline.outputs.status }}" == "success" ]; then
            echo "✅ Pipeline completed successfully" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Pipeline failed" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "See pipeline.log artifact for details." >> $GITHUB_STEP_SUMMARY

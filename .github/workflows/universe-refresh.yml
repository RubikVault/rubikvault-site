name: Universe Refresh

on:
  workflow_dispatch:
    inputs:
      indices:
        description: 'Which indices to fetch (all, sp500, nasdaq100, dowjones, russell2000)'
        required: false
        default: 'all'

permissions:
  contents: write

concurrency:
  group: universe-refresh-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fetch-constituents:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Fetch Index Constituents
        env:
          EODHD_API_KEY: ${{ secrets.EODHD_API_KEY }}
        run: node scripts/universe/fetch-constituents.mjs
      
      - name: Show Results
        run: |
          echo "Universe files created:"
          ls -la public/data/universe/
          echo ""
          echo "Symbol counts:"
          for f in public/data/universe/*.json; do
            count=$(jq 'length' "$f")
            echo "  $(basename $f): $count symbols"
          done
      
      - name: Commit Changes
        run: |
          set -euo pipefail
          git config --global user.name "rv-bot"
          git config --global user.email "bot@rubikvault.com"
          git add public/data/universe/ policies/universe/
          if git diff --cached --quiet; then
            echo "No universe changes to commit."
            exit 0
          fi
          git commit -m "chore(universe): refresh index constituents [skip ci]"
          target_branch="${GITHUB_REF_NAME:-main}"
          for i in 1 2 3; do
            git fetch origin "$target_branch"
            if ! git rebase "origin/$target_branch"; then
              if [ -d .git/rebase-merge ] || [ -d .git/rebase-apply ]; then
                git rebase --abort
              fi
              echo "GREEN-SKIP: rebase conflict on ${target_branch}; publish deferred." >&2
              echo "GREEN-SKIP: rebase conflict on ${target_branch}; publish deferred." >> "$GITHUB_STEP_SUMMARY"
              exit 0
            fi
            if git push origin "HEAD:${target_branch}"; then
              echo "Push succeeded on attempt $i."
              exit 0
            fi
            echo "Push failed on attempt $i; retrying..."
            sleep 2
          done
          echo "GREEN-SKIP: push failed after retries (likely concurrent writer); publish deferred." >&2
          echo "GREEN-SKIP: push failed after retries (likely concurrent writer); publish deferred." >> "$GITHUB_STEP_SUMMARY"
          exit 0

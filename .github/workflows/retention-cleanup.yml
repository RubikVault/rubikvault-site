name: retention-cleanup

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: retention-cleanup-${{ github.ref }}
  cancel-in-progress: false

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cleanup by policy
        run: node scripts/ops/retention-cleanup.v3.mjs

      - name: Commit cleanup report
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/v3/system/retention-cleanup.latest.json mirrors || true
          if git diff --cached --quiet; then
            echo "No cleanup changes"
            exit 0
          fi
          git commit -m "chore(v3): retention cleanup"
          target_branch="main"
          for i in 1 2 3; do
            git fetch origin "$target_branch"
            if ! git rebase "origin/$target_branch"; then
              if [ -d .git/rebase-merge ] || [ -d .git/rebase-apply ]; then
                git rebase --abort
              fi
              echo "GREEN-SKIP: rebase conflict on ${target_branch}; publish deferred." >&2
              echo "GREEN-SKIP: rebase conflict on ${target_branch}; publish deferred." >> "$GITHUB_STEP_SUMMARY"
              exit 0
            fi
            if git push origin "HEAD:${target_branch}"; then
              exit 0
            fi
            echo "push failed (attempt $i); retrying in 5s" >&2
            sleep 5
          done
          echo "GREEN-SKIP: push failed after retries (likely concurrent writer); publish deferred." >&2
          echo "GREEN-SKIP: push failed after retries (likely concurrent writer); publish deferred." >> "$GITHUB_STEP_SUMMARY"
          exit 0

name: data-branch-sync

on:
  schedule:
    - cron: '0 2 * * 0'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: data-branch-sync-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync mirrors + system ledgers to data branch
        run: |
          set -euo pipefail
          WORKTREE_DIR="/tmp/data-branch"
          git fetch origin data || true
          if git show-ref --verify --quiet refs/remotes/origin/data; then
            git worktree add "$WORKTREE_DIR" origin/data
          else
            git worktree add -b data "$WORKTREE_DIR"
          fi

          mkdir -p "$WORKTREE_DIR/mirrors"
          mkdir -p "$WORKTREE_DIR/public/data/v3/system"
          rsync -a --delete mirrors/ "$WORKTREE_DIR/mirrors/"
          rsync -a --delete public/data/v3/system/ "$WORKTREE_DIR/public/data/v3/system/"

          cd "$WORKTREE_DIR"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add mirrors public/data/v3/system
          if git diff --cached --quiet; then
            echo "No changes to sync"
            exit 0
          fi
          git commit -m "chore(v3): sync mirrors/system to data branch"
          target_branch="data"
          for i in 1 2 3; do
            git fetch origin "$target_branch"
            if ! git rebase "origin/$target_branch"; then
              if [ -d .git/rebase-merge ] || [ -d .git/rebase-apply ]; then
                git rebase --abort
              fi
              echo "GREEN-SKIP: rebase conflict on ${target_branch}; publish deferred." >&2
              echo "GREEN-SKIP: rebase conflict on ${target_branch}; publish deferred." >> "$GITHUB_STEP_SUMMARY"
              exit 0
            fi
            if git push origin "HEAD:${target_branch}"; then
              exit 0
            fi
            echo "push failed (attempt $i); retrying in 5s" >&2
            sleep 5
          done
          echo "GREEN-SKIP: push failed after retries (likely concurrent writer); publish deferred." >&2
          echo "GREEN-SKIP: push failed after retries (likely concurrent writer); publish deferred." >> "$GITHUB_STEP_SUMMARY"
          exit 0

name: QuantLab Daily

on:
  workflow_dispatch: {}
  # schedule disabled — quantlab/ runs externally in QuantLabHot/rubikvault-quantlab/
  # Re-enable when quantlab/ directory is committed to this repo

permissions:
  contents: write

concurrency:
  group: quantlab-daily
  cancel-in-progress: false

jobs:
  quantlab-daily:
    runs-on: ubuntu-latest
    # defaults.run.working-directory removed — quantlab/ not in repo
    steps:
      - uses: actions/checkout@v4

      - name: Check quantlab available
        id: check-quantlab
        run: |
          if [ -f quantlab/pyproject.toml ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "## QuantLab Daily — Skipped" >> "$GITHUB_STEP_SUMMARY"
            echo "quantlab/ directory not found in this repo. Runs externally in QuantLabHot/rubikvault-quantlab." >> "$GITHUB_STEP_SUMMARY"
          fi

      - uses: actions/setup-python@v5
        if: steps.check-quantlab.outputs.available == 'true'
        with:
          python-version: '3.11'

      - name: Setup uv
        if: steps.check-quantlab.outputs.available == 'true'
        uses: astral-sh/setup-uv@v3

      - name: Sync deps
        if: steps.check-quantlab.outputs.available == 'true'
        run: uv sync --extra dev
        working-directory: quantlab

      - name: Run daily
        if: steps.check-quantlab.outputs.available == 'true'
        run: uv run python -m quantlab run daily
        working-directory: quantlab

      - name: Publish
        if: steps.check-quantlab.outputs.available == 'true'
        run: uv run python -m quantlab publish
        working-directory: quantlab

      - name: Audit verify
        if: steps.check-quantlab.outputs.available == 'true'
        run: uv run python -m quantlab audit verify
        working-directory: quantlab

      - name: Commit artifacts
        if: steps.check-quantlab.outputs.available == 'true'
        run: |
          cd ..
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/quantlab
          if git diff --cached --quiet; then
            echo "No staged changes"
            exit 0
          fi
          git commit -m "chore(quantlab): daily artifacts [skip ci]"
          target_branch="${GITHUB_REF_NAME:-main}"
          for i in 1 2 3; do
            git fetch origin "$target_branch"
            if ! git rebase "origin/$target_branch"; then
              if [ -d .git/rebase-merge ] || [ -d .git/rebase-apply ]; then
                git rebase --abort
              fi
              echo "GREEN-SKIP: rebase conflict on ${target_branch}; publish deferred." >&2
              echo "GREEN-SKIP: rebase conflict on ${target_branch}; publish deferred." >> "$GITHUB_STEP_SUMMARY"
              exit 0
            fi
            if git push origin "HEAD:${target_branch}"; then
              exit 0
            fi
            echo "push failed (attempt $i); retrying in 5s" >&2
            sleep 5
          done
          echo "GREEN-SKIP: push failed after retries (likely concurrent writer); publish deferred." >&2
          echo "GREEN-SKIP: push failed after retries (likely concurrent writer); publish deferred." >> "$GITHUB_STEP_SUMMARY"
          exit 0

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quantlab-${{ github.run_number }}
          path: |
            public/data/quantlab
          retention-days: 14

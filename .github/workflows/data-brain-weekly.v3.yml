name: data-brain-weekly.v3

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: data-brain-weekly-v3-${{ github.ref }}
  cancel-in-progress: false

jobs:
  brain:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Weekly fundamentals + drift
        env:
          TIINGO_API_KEY: ${{ secrets.TIINGO_API_KEY }}
        run: npm run dp7:v3

      - name: Run exchange drift
        env:
          EODHD_API_KEY: ${{ secrets.EODHD_API_KEY }}
        run: node scripts/validators/check-exchange-drift.v3.mjs

      - name: Contracts
        run: npm run test:v3:contracts

      - name: Commit weekly artifacts
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/v3 mirrors/meta/eodhd/exchanges-list || true
          if git diff --cached --quiet; then
            echo "No weekly updates"
            exit 0
          fi
          git commit -m "chore(v3): weekly data brain refresh"
          target_branch="main"
          for i in 1 2 3; do
            git fetch origin "$target_branch"
            if ! git rebase "origin/$target_branch"; then
              if [ -d .git/rebase-merge ] || [ -d .git/rebase-apply ]; then
                git rebase --abort
              fi
              echo "GREEN-SKIP: rebase conflict on ${target_branch}; publish deferred." >&2
              echo "GREEN-SKIP: rebase conflict on ${target_branch}; publish deferred." >> "$GITHUB_STEP_SUMMARY"
              exit 0
            fi
            if git push origin "HEAD:${target_branch}"; then
              exit 0
            fi
            echo "push failed (attempt $i); retrying in 5s" >&2
            sleep 5
          done
          echo "GREEN-SKIP: push failed after retries (likely concurrent writer); publish deferred." >&2
          echo "GREEN-SKIP: push failed after retries (likely concurrent writer); publish deferred." >> "$GITHUB_STEP_SUMMARY"
          exit 0

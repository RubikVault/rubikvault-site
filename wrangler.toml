name = "rubikvault-site"
compatibility_date = "2025-12-17"
compatibility_flags = ["nodejs_compat"]

# Cloudflare Pages deploy output folder.
# Built locally by: npm run build:deploy  (scripts/ops/build-deploy-bundle.mjs)
# Deployed by:      node scripts/ops/release-gate-check.mjs  (MacBook supervisor only)
# GitHub integration should be DISABLED in the Cloudflare Pages dashboard — deploy
# is triggered exclusively via explicit wrangler CLI from the MacBook supervisor.
pages_build_output_dir = "dist/pages-prod"

# KV binding for Pages Functions + local dev
[[kv_namespaces]]
binding = "RV_KV"
id = "323d53e7392e42ff9089daf8977dfde3"
preview_id = "30c57392d8f04dfbaeb71fd8bedea15f"

# Optional: put ONLY non-secret values here (never API keys)
# [vars]
# PROD_URL = "https://rubikvault.com"
# MIRROR_BASE_URL = "https://rubikvault.com"
